<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ MLBB Packages</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
        
        :root {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255,255,255,0.6);
            --bg-input: rgba(255,255,255,0.7);
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --border-color: rgba(0,0,0,0.06);
            --shadow: rgba(0,0,0,0.06);
            --shadow-hover: rgba(0,0,0,0.1);
            --cyan: #00b4d8;
            --cyan-glow: rgba(0,180,216,0.2);
            --purple: #7c3aed;
            --violet: #8b5cf6;
            --pink: #ec4899;
            --gold: #f5a623;
            --gold-glow: rgba(245,166,35,0.25);
            --orange: #ff6a00;
            --red: #ff0044;
            --green: #00c853;
            --green-glow: rgba(0,200,83,0.2);
        }

        .night-mode {
            --bg-primary: #0d0d1a;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(30,30,60,0.5);
            --bg-input: rgba(40,40,80,0.5);
            --text-primary: #e8eaf0;
            --text-secondary: #a8a8c8;
            --border-color: rgba(255,255,255,0.06);
            --shadow: rgba(0,0,0,0.3);
            --shadow-hover: rgba(0,0,0,0.4);
            --gold: #ffd700;
            --gold-glow: rgba(255,215,0,0.2);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 90px;
            transition: all 0.4s ease;
        }

        .container{max-width:480px;margin:0 auto}

        .header{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0 14px;flex-wrap:wrap;gap:6px}
        .header .left{display:flex;flex-direction:column;gap:8px}
        .header .left .logo-wrap{display:flex;align-items:center;gap:10px}
        .header .left .logo-wrap img{height:38px;width:auto;border-radius:10px}
        .header .left .logo-wrap .text-group{display:flex;flex-direction:column;line-height:1.1}
        .header .left .logo-wrap .text-group .premium{
            font-size:1rem;
            font-weight:800;
            background:linear-gradient(135deg, var(--cyan), var(--purple), var(--violet), var(--pink));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-size:300% 300%;
            animation:colorShift 2s ease-in-out infinite
        }
        @keyframes colorShift {
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }
        .header .left .logo-wrap .text-group .shop{font-size:0.55rem;font-weight:600;color:var(--text-secondary);opacity:0.6;margin-top:-2px}
        
        .header .right .top{display:flex;gap:6px;align-items:center}
        .header .right .top .lang-switcher{
            display:flex;
            gap:2px;
            background:var(--bg-card);
            padding:3px;
            border-radius:10px;
            border:1px solid var(--border-color);
            backdrop-filter:blur(20px)
        }
        .header .right .top .lang-switcher .lang-btn{
            background:transparent;
            border:none;
            color:var(--text-secondary);
            padding:3px 10px;
            border-radius:6px;
            font-size:0.5rem;
            font-weight:700;
            cursor:pointer;
            text-transform:uppercase;
            transition:all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)
        }
        .header .right .top .lang-switcher .lang-btn:active{transform:scale(0.92)!important}
        .header .right .top .lang-switcher .lang-btn.active{
            background:linear-gradient(135deg,var(--cyan),var(--purple));
            color:#fff;
            box-shadow:0 4px 15px rgba(0,180,216,0.3)
        }
        .header .right .top .night-toggle{
            background:var(--bg-card);
            border:1px solid var(--border-color);
            border-radius:10px;
            width:34px;
            height:34px;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            font-size:1.1rem;
            color:var(--text-secondary);
            backdrop-filter:blur(20px);
            transition:all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)
        }
        .header .right .top .night-toggle:active{transform:scale(0.92)!important}
        .night-mode .header .right .top .night-toggle .fa-sun{color:#ffd700}
        .header .right .top .noti-btn{
            background:var(--bg-card);
            border:1px solid var(--border-color);
            border-radius:10px;
            width:34px;
            height:34px;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            font-size:1rem;
            color:var(--text-secondary);
            position:relative;
            text-decoration:none;
            backdrop-filter:blur(20px);
            transition:all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)
        }
        .header .right .top .noti-btn:active{transform:scale(0.92)!important}
        .header .right .top .noti-btn .badge{
            position:absolute;
            top:-4px;
            right:-4px;
            background:var(--red);
            color:#fff;
            font-size:0.4rem;
            font-weight:700;
            padding:1px 6px;
            border-radius:50%;
            display:none
        }

        .page-header{margin-bottom:16px;animation:slideUp 0.6s ease}
        .page-header h1{font-size:1.3rem;font-weight:800;color:var(--text-primary)}
        .page-header h1 span{
            background:linear-gradient(135deg,var(--cyan),var(--purple),var(--violet),var(--pink));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-size:300% 300%;
            animation:gradientMove 2s ease-in-out infinite
        }
        @keyframes gradientMove{
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }
        .page-header h1 i{color:var(--cyan);margin-right:6px}
        .page-header p{color:var(--text-secondary);font-size:0.7rem;margin-top:2px}

        .section-title{
            font-size:.65rem;
            font-weight:700;
            color:var(--text-secondary);
            text-transform:uppercase;
            letter-spacing:2px;
            margin-bottom:12px;
            display:flex;
            align-items:center;
            gap:10px;
            opacity:.5
        }
        .section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border-color),transparent)}
        .section-title i{
            background:linear-gradient(135deg,var(--cyan),var(--purple),var(--violet),var(--pink));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-size:300% 300%;
            animation:iconGradient 1.5s ease-in-out infinite;
            font-size:0.8rem
        }
        @keyframes iconGradient{
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }
        .section-title span{color:var(--text-secondary);opacity:0.5}

        /* ===== SERVER SELECTOR ===== */
        .server-selector{
            background:var(--bg-card);
            backdrop-filter:blur(20px);
            border:1px solid var(--border-color);
            border-radius:14px;
            padding:10px 14px;
            display:flex;
            align-items:center;
            gap:12px;
            margin-bottom:16px;
            box-shadow:0 4px 20px var(--shadow);
            flex-wrap:wrap;
            overflow:visible
        }
        .server-selector .label{
            font-size:0.55rem;
            color:var(--text-secondary);
            font-weight:600;
            text-transform:uppercase;
            letter-spacing:0.5px;
            flex-shrink:0
        }
        .server-selector .options{
            display:flex;
            gap:6px;
            flex-wrap:wrap;
            flex:1
        }
        .server-selector .options .opt{
            background:var(--bg-input);
            border:1px solid var(--border-color);
            color:var(--text-secondary);
            padding:4px 14px;
            border-radius:8px;
            font-size:0.55rem;
            font-weight:600;
            cursor:pointer;
            transition:all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space:nowrap
        }
        .server-selector .options .opt:active{transform:scale(0.92)!important}
        .server-selector .options .opt.active{
            background:linear-gradient(135deg,var(--cyan),var(--purple),var(--violet));
            color:#fff;
            border-color:var(--cyan);
            box-shadow:0 0 20px var(--cyan-glow)
        }
        .server-selector .options .opt .flag{margin-right:4px}
        /* Ban Server - အထူးအရောင် */
        .server-selector .options .opt.ban{
            border-color:rgba(255,0,68,0.2);
            color:var(--red)
        }
        .server-selector .options .opt.ban.active{
            background:linear-gradient(135deg,var(--red),var(--orange));
            border-color:var(--red);
            color:#fff;
            box-shadow:0 0 20px rgba(255,0,68,0.2)
        }

        /* ===== PACKAGE GRID - 3 per row (အရင်ပုံစံ) ===== */
        .package-grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:8px;
            margin-bottom:20px
        }
        .package-item{
            background:var(--bg-card);
            backdrop-filter:blur(20px);
            border:1px solid var(--border-color);
            border-radius:14px;
            padding:12px 8px;
            text-align:center;
            cursor:pointer;
            transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow:0 4px 20px var(--shadow);
            position:relative;
            overflow:hidden;
            display:flex;
            flex-direction:column;
            align-items:center
        }
        .package-item:active{transform:scale(0.94)!important}
        .package-item:hover{transform:translateY(-4px);border-color:rgba(245,166,35,0.3)}
        .package-item.selected{border-color:var(--gold);background:rgba(245,166,35,0.06);box-shadow:0 0 12px var(--gold-glow)}
        .package-item.selected .price{color:var(--gold)}
        
        .package-item .pkg-img-wrap{
            width:100%;
            aspect-ratio:1;
            border-radius:8px;
            overflow:hidden;
            background:transparent;
            margin-bottom:4px
        }
        .package-item .pkg-img-wrap img{
            width:100%;
            height:100%;
            object-fit:contain;
            display:block;
            animation:floatPkg 3s ease-in-out infinite
        }
        @keyframes floatPkg{
            0%,100%{transform:translateY(0)}
            50%{transform:translateY(-5px)}
        }
        .package-item:hover .pkg-img-wrap img{animation:floatPkg 1.5s ease-in-out infinite}
        .package-item.selected .pkg-img-wrap img{box-shadow:0 0 8px var(--gold-glow)}
        
        .package-item .info{
            display:flex;
            flex-direction:column;
            gap:1px;
            width:100%
        }
        .package-item .info .name{
            font-size:0.65rem;
            font-weight:700;
            color:var(--text-primary)
        }
        .package-item .info .sub{
            font-size:0.4rem;
            color:var(--text-secondary);
            line-height:1.2
        }
        .package-item .info .badge{
            display:inline-block;
            font-size:0.35rem;
            color:var(--gold);
            background:rgba(245,166,35,0.1);
            padding:1px 8px;
            border-radius:8px;
            border:1px solid rgba(245,166,35,0.08);
            font-weight:600;
            margin-top:2px;
            width:fit-content;
            margin-left:auto;
            margin-right:auto
        }
        .package-item .bottom{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:4px;
            margin-top:4px;
            width:100%
        }
        .package-item .bottom .price{
            font-size:0.65rem;
            font-weight:700;
            color:var(--text-secondary);
            transition:all 0.4s ease
        }
        .package-item .bottom .btn-label{
            font-size:0.45rem;
            color:var(--text-secondary);
            font-weight:500;
            opacity:0.6;
            letter-spacing:0.3px
        }
        .package-item .bottom .buy-btn{
            display:none;
            background:linear-gradient(135deg,var(--gold),var(--orange));
            color:#fff;
            border:none;
            padding:4px 12px;
            border-radius:8px;
            font-size:0.45rem;
            font-weight:700;
            cursor:pointer;
            transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow:0 4px 15px var(--gold-glow)
        }
        .package-item .bottom .buy-btn:active{transform:scale(0.88)!important}
        .package-item.selected .bottom .buy-btn{display:block}
        .package-item.selected .bottom .btn-label{display:none}

        .bottom-nav {
            position:fixed;
            bottom:16px;
            left:16px;
            right:16px;
            width:auto;
            max-width:480px;
            margin:0 auto;
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius:18px;
            display:flex;
            justify-content:space-around;
            padding:8px 4px;
            z-index:100;
            box-shadow: 0 4px 30px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.08);
            animation:navSlideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)
        }
        @keyframes navSlideUp {
            from{opacity:0;transform:translateY(30px)}
            to{opacity:1;transform:translateY(0)}
        }
        .bottom-nav::before {
            content:'';
            position:absolute;
            top:0;
            left:0;
            right:0;
            bottom:0;
            border-radius:18px;
            background:linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 50%);
            pointer-events:none;
            z-index:0
        }
        .night-mode .bottom-nav::before {
            background:linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 50%)
        }
        .bottom-nav .nav-item {
            text-align:center;
            cursor:pointer;
            text-decoration:none;
            color:var(--text-secondary);
            transition:all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding:6px 12px;
            border-radius:12px;
            min-width:48px;
            border:1px solid transparent;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:1px;
            animation:floatIcon 3s ease-in-out infinite;
            position:relative;
            z-index:1
        }
        .bottom-nav .nav-item:nth-child(2){animation-delay:0.2s}
        .bottom-nav .nav-item:nth-child(3){animation-delay:0.4s}
        .bottom-nav .nav-item:nth-child(4){animation-delay:0.6s}
        .bottom-nav .nav-item:active{transform:scale(0.88)!important;animation:none}
        .bottom-nav .nav-item .icon{font-size:1.2rem;display:block}
        .bottom-nav .nav-item .label{font-size:0.4rem;letter-spacing:0.5px;opacity:0.5;font-weight:400}
        .bottom-nav .nav-item.active{
            background:rgba(0,180,216,0.08);
            border:1px solid rgba(0,180,216,0.12);
            box-shadow:0 0 30px rgba(0,180,216,0.05)
        }
        .bottom-nav .nav-item.active .icon{
            transform:translateY(-2px) scale(1.1);
            background:linear-gradient(135deg,var(--cyan),var(--purple));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent
        }
        .bottom-nav .nav-item.active .label{
            background:linear-gradient(135deg,var(--cyan),var(--purple));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            opacity:1;
            font-weight:600
        }

        .footer-text{text-align:center;color:var(--text-secondary);font-size:0.45rem;margin-top:10px;opacity:0.3}

        .toast{
            position:fixed;
            bottom:85px;
            left:50%;
            transform:translateX(-50%);
            background:var(--bg-secondary);
            padding:10px 20px;
            border-radius:12px;
            border:1px solid var(--border-color);
            color:var(--cyan);
            font-weight:600;
            font-size:0.75rem;
            display:none;
            z-index:200;
            text-align:center;
            max-width:90%;
            box-shadow:0 4px 20px var(--shadow)
        }
        .toast.show{display:block;animation:toastPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)}
        @keyframes toastPop{from{opacity:0;transform:translateX(-50%) translateY(30px) scale(0.85)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        @keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

        .glass-box{background:var(--bg-card);backdrop-filter:blur(20px);border:1px solid var(--border-color);border-radius:16px}
        
        /* ===== SECTION HIDE/SHOW ===== */
        .section-wrapper{display:block}
        .section-wrapper.hidden{display:none}
    </style>
</head>
<body>
<div class="container">
    <!-- HEADER -->
    <div class="header">
        <div class="left">
            <div class="logo-wrap">
                <img src="https://files.catbox.moe/lmq98x.jpg" alt="Premium Shop Logo">
                <div class="text-group">
                    <span class="premium" id="appName">Premium</span>
                    <span class="shop" id="appSub">Game Shop</span>
                </div>
            </div>
        </div>
        <div class="right">
            <div class="top">
                <div class="lang-switcher">
                    <button class="lang-btn active" data-lang="my">မြန်မာ</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
                <button class="night-toggle"><i class="fas fa-moon"></i></button>
                <a href="notifications.html" class="noti-btn" id="notiBtn"><i class="fas fa-bell"></i><span class="badge" id="notiBadge">0</span></a>
            </div>
        </div>
    </div>

    <!-- PAGE HEADER -->
    <div class="page-header">
        <h1><i class="fas fa-gem"></i> <span id="pageTitle">MLBB Packages</span></h1>
        <p id="pageSub">ပက်ကေ့ချ်တစ်ခုရွေးပြီး ဝယ်ယူပါ</p>
    </div>

    <!-- SERVER SELECTOR -->
    <div class="server-selector">
        <span class="label"><i class="fas fa-server"></i> Server</span>
        <div class="options" id="serverOptions">
            <span class="opt active" data-server="global" onclick="switchServer('global')"><span class="flag">🌍</span>Global</span>
            <span class="opt ban" data-server="ban" onclick="switchServer('ban')"><span class="flag">🇲🇾🇸🇬🇵🇭</span>Ban Server</span>
            <span class="opt" data-server="indo" onclick="switchServer('indo')"><span class="flag">🇮🇩</span>Indo</span>
            <span class="opt" data-server="russia" onclick="switchServer('russia')"><span class="flag">🇷🇺</span>Russia</span>
        </div>
    </div>

    <!-- ===== GLOBAL SERVER ===== -->
    <div class="section-wrapper" id="globalSection">
        <div class="section-title"><i class="fas fa-gift"></i> <span id="bundlesTitle">ပက်ကေ့ချ်များ</span></div>
        <div class="package-grid" id="globalBundles"></div>
        
        <div class="section-title"><i class="fas fa-star"></i> <span id="doubleTitle">နှစ်ဆဖြည့်မှု</span></div>
        <div class="package-grid" id="globalDouble"></div>
        
        <div class="section-title"><i class="fas fa-diamond"></i> <span id="diamondsTitle">စိန်များ</span></div>
        <div class="package-grid" id="globalDiamonds"></div>
    </div>

    <!-- ===== BAN SERVER (Malay/Sin/Php) ===== -->
    <div class="section-wrapper hidden" id="banSection">
        <div class="section-title"><i class="fas fa-gift"></i> <span id="banBundlesTitle">ပက်ကေ့ချ်များ</span></div>
        <div class="package-grid" id="banBundles"></div>
        
        <div class="section-title"><i class="fas fa-star"></i> <span id="banDoubleTitle">နှစ်ဆဖြည့်မှု</span></div>
        <div class="package-grid" id="banDouble"></div>
        
        <div class="section-title"><i class="fas fa-diamond"></i> <span id="banDiamondsTitle">စိန်များ</span></div>
        <div class="package-grid" id="banDiamonds"></div>
    </div>

    <!-- ===== INDO SERVER ===== -->
    <div class="section-wrapper hidden" id="indoSektion">
        <div class="section-title"><i class="fas fa-gift"></i> <span id="indoBundlesTitle">ပက်ကေ့ချ်များ</span></div>
        <div class="package-grid" id="indoBundles"></div>
        
        <div class="section-title"><i class="fas fa-diamond"></i> <span id="indoDiamondsTitle">စိန်များ</span></div>
        <div class="package-grid" id="indoDiamonds"></div>
    </div>

    <!-- ===== RUSSIA SERVER ===== -->
    <div class="section-wrapper hidden" id="russiaSection">
        <div class="section-title"><i class="fas fa-gift"></i> <span id="russiaBundlesTitle">ပက်ကေ့ချ်များ</span></div>
        <div class="package-grid" id="russiaBundles"></div>
        
        <div class="section-title"><i class="fas fa-diamond"></i> <span id="russiaDiamondsTitle">စိန်များ</span></div>
        <div class="package-grid" id="russiaDiamonds"></div>
    </div>

    <div class="footer-text">&copy; 2026 Premium Game Shop</div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">

    // ============================================================
    // RENDER FUNCTIONS (အရင်ပုံစံအတိုင်း)
    // ============================================================
    function renderItems(items, containerId) {
        const d = LANG_DATA[currentLang];
        const container = document.getElementById(containerId);
        if (!container) return;
        
        if (!items || items.length === 0) {
            container.innerHTML = '';
            return;
        }
        
        container.innerHTML = items.map(pkg => {
            const isSelected = selectedPackage && selectedPackage.id === pkg.id;
            const subHtml = pkg.sub ? `<div class="sub">${pkg.sub}</div>` : '';
            const badgeHtml = pkg.badge ? `<span class="badge">${d.doubleBadge}</span>` : '';
            
            return `
                <div class="package-item ${isSelected?'selected':''}" onclick="handlePackageClick('${pkg.id}','${pkg.name}',${pkg.price})">
                    <div class="pkg-img-wrap">
                        <img src="${pkg.img}" alt="${pkg.name}" onerror="this.style.display='none'">
                    </div>
                    <div class="info">
                        <div class="name">${pkg.name}</div>
                        ${subHtml}
                        ${badgeHtml}
                    </div>
                    <div class="bottom">
                        <span class="price">${pkg.price.toLocaleString()} ${d.currency}</span>
                        <span class="btn-label">${d.select}</span>
                        <button class="buy-btn" onclick="event.stopPropagation(); handleBuyClick('${pkg.id}','${pkg.name}',${pkg.price})">${d.topUp}</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderAllPackages() {
        renderItems(PACKAGES.global.bundles, 'globalBundles');
        renderItems(PACKAGES.global.double, 'globalDouble');
        renderItems(PACKAGES.global.diamonds, 'globalDiamonds');
        
        renderItems(PACKAGES.ban.bundles, 'banBundles');
        renderItems(PACKAGES.ban.double, 'banDouble');
        renderItems(PACKAGES.ban.diamonds, 'banDiamonds');
        
        renderItems(PACKAGES.indo.bundles, 'indoBundles');
        renderItems(PACKAGES.indo.diamonds, 'indoDiamonds');
        
        renderItems(PACKAGES.russia.bundles, 'russiaBundles');
        renderItems(PACKAGES.russia.diamonds, 'russiaDiamonds');
    }

    function handlePackageClick(id, name, price) {
        if (selectedPackage && selectedPackage.id === id) {
            selectedPackage = null;
        } else {
            selectedPackage = { id, name, price };
        }
        renderAllPackages();
    }

    function handleBuyClick(id, name, price) {
        if (!selectedPackage || selectedPackage.id !== id) {
            selectedPackage = { id, name, price };
            renderAllPackages();
        }
        showToast('🛒 ' + name + ' selected!');
    }

    // ============================================================
    // SERVER SWITCHER
    // ============================================================
    function switchServer(server) {
        currentServer = server;
        
        document.querySelectorAll('.server-selector .opt').forEach(opt => {
            opt.classList.toggle('active', opt.dataset.server === server);
        });
        
        document.getElementById('globalSection').classList.toggle('hidden', server !== 'global');
        document.getElementById('banSection').classList.toggle('hidden', server !== 'ban');
        document.getElementById('indoSektion').classList.toggle('hidden', server !== 'indo');
        document.getElementById('russiaSection').classList.toggle('hidden', server !== 'russia');
        
        selectedPackage = null;
        renderAllPackages();
    }

            document.querySelectorAll('.lang-btn').forEach(b2 => b2.classList.toggle('active', b2.dataset.lang === lang));

        });
    });

    document.querySelector('.night-toggle').addEventListener('click', toggleNightMode);

    document.querySelectorAll('.bottom-nav .nav-item').forEach(item => {
