<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ပရိုဖိုင် - Premium Game Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Myanmar Text', 'Pyidaungsu', sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .profile-container {
            max-width: 480px;
            width: 100%;
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid #2a2a4a;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }
        .profile-container h1 {
            font-size: 28px;
            color: #e94560;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
        .profile-avatar-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
        }
        .profile-avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid #e94560;
            object-fit: cover;
            background: #0f0f1a;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.2);
        }
        .profile-avatar:hover {
            transform: scale(1.02);
            border-color: #f5c842;
        }
        .profile-avatar-wrapper .camera-icon {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #e94560;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            border: 2px solid #0f0f1a;
            transition: 0.3s;
        }
        .profile-avatar-wrapper .camera-icon:hover {
            background: #f5c842;
        }
        #profilePicInput {
            display: none;
        }
        .profile-name {
            font-size: 26px;
            font-weight: 600;
            margin-top: 10px;
        }
        .profile-email {
            color: #aaa;
            font-size: 15px;
            margin-bottom: 25px;
        }
        .points-box {
            background: #0f0f1a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2a2a4a;
            margin: 20px 0 30px;
        }
        .points-box .label {
            font-size: 14px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .points-box .points-value {
            font-size: 42px;
            font-weight: 700;
            color: #f5c842;
            text-shadow: 0 0 20px rgba(245, 200, 66, 0.2);
        }
        .points-box .points-value span {
            font-size: 20px;
            color: #aaa;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-group button {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary {
            background: #e94560;
            color: #fff;
        }
        .btn-primary:hover {
            background: #c73652;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: transparent;
            color: #fff;
            border: 2px solid #e94560;
        }
        .btn-secondary:hover {
            background: #e94560;
        }
        .btn-danger {
            background: transparent;
            color: #e74c3c;
            border: 2px solid #e74c3c;
        }
        .btn-danger:hover {
            background: #e74c3c;
            color: #fff;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 28px;
            border-radius: 10px;
            color: #fff;
            font-weight: 500;
            z-index: 99999;
            animation: slideIn 0.4s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            max-width: 350px;
        }
        .notification.success {
            background: #2ecc71;
        }
        .notification.error {
            background: #e74c3c;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @media (max-width: 500px) {
            .profile-container {
                padding: 25px 18px;
            }
            .profile-avatar {
                width: 100px;
                height: 100px;
            }
            .profile-avatar-wrapper {
                width: 100px;
                height: 100px;
            }
            .points-box .points-value {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <h1>👤 ပရိုဖိုင်</h1>

        <div class="profile-avatar-wrapper">
            <img src="default-avatar.png" alt="Profile" class="profile-avatar" id="profileAvatar">
            <div class="camera-icon" onclick="document.getElementById('profilePicInput').click()">📷</div>
            <input type="file" id="profilePicInput" accept="image/*" onchange="uploadProfilePicture()">
        </div>

        <div class="profile-name" id="profileName">အသုံးပြုသူ</div>
        <div class="profile-email" id="profileEmail">user@example.com</div>

        <div class="points-box">
            <div class="label">🎮 ယူစာနိမ်း</div>
            <div class="points-value" id="gamePoints">1,250 <span>Pts</span></div>
        </div>

        <div class="btn-group">
            <button class="btn-primary" onclick="window.location.href='index.html'">🏠 နောက်သို့</button>
            <button class="btn-danger" onclick="logoutUser()">🚪 ထွက်ရန်</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Login မဝင်ရသေးရင် Home သို့ ပြန်ပို့
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'index.html';
                return;
            }

            const username = localStorage.getItem('username') || 'အသုံးပြုသူ';
            document.getElementById('profileName').textContent = username;

            const savedImage = localStorage.getItem('profileImage');
            if (savedImage) {
                document.getElementById('profileAvatar').src = savedImage;
            }

            const points = localStorage.getItem('gamePoints') || '1000';
            document.getElementById('gamePoints').innerHTML = parseInt(points).toLocaleString() + ' <span>Pts</span>';
        });

        function uploadProfilePicture() {
            const fileInput = document.getElementById('profilePicInput');
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    localStorage.setItem('profileImage', e.target.result);
                    document.getElementById('profileAvatar').src = e.target.result;
                    showNotification('ပရိုဖိုင်ပုံ ပြောင်းလဲပြီးပါပြီ။', 'success');
                };
                reader.readAsDataURL(file);
            }
        }

        function logoutUser() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('username');
            window.location.href = 'index.html';
        }

        function showNotification(msg, type = 'success') {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();

            const notif = document.createElement('div');
            notif.className = 'notification ' + type;
            notif.textContent = msg;
            document.body.appendChild(notif);

            setTimeout(() => {
                if (notif.parentNode) notif.remove();
            }, 3500);
        }
    </script>

</body>
</html>
