<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Premium Game Shop - Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
        
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111927;
            --bg-card: #141c2b;
            --bg-input: #1a2438;
            --text-primary: #ffffff;
            --text-secondary: #8899bb;
            --border-color: rgba(255,255,255,0.06);
            --shadow: rgba(0,0,0,0.5);
            --gold: #f5c842;
            --gold-glow: rgba(245,200,66,0.3);
            --cyan: #00d4ff;
            --cyan-glow: rgba(0,212,255,0.2);
            --pink: #ff6b9d;
            --orange: #f97316;
            --orange-glow: rgba(249,115,22,0.2);
            --green: #22d3ee;
            --green-glow: rgba(34,211,238,0.2);
            --red: #ef4444;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 90px;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(245,200,66,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(0,212,255,0.04) 0%, transparent 50%);
        }

        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:var(--bg-primary)}
        ::-webkit-scrollbar-thumb{background:var(--gold);border-radius:10px}

        .container{max-width:500px;margin:0 auto}

        .header{display:flex;justify-content:space-between;align-items:center;padding:6px 0 14px;flex-wrap:wrap;gap:6px}
        .header .logo{font-size:1rem;font-weight:800;color:var(--gold);text-shadow:0 0 20px var(--gold-glow);letter-spacing:0.5px}
        .header .logo i{color:var(--cyan);margin-right:6px;text-shadow:0 0 20px var(--cyan-glow)}
        .header .right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

        .lang-switcher{display:flex;gap:2px;background:var(--bg-card);padding:3px;border-radius:8px;border:1px solid var(--border-color)}
        .lang-switcher .lang-btn{background:transparent;border:none;color:var(--text-secondary);padding:3px 8px;border-radius:6px;font-size:0.5rem;font-weight:700;cursor:pointer;transition:all 0.2s ease;text-transform:uppercase}
        .lang-switcher .lang-btn.active{background:var(--gold);color:#0a0e1a;box-shadow:0 0 20px var(--gold-glow)}
        .lang-switcher .lang-btn:active{transform:scale(0.85)}

        .auth-btn{background:transparent;border:1px solid var(--border-color);color:var(--text-secondary);padding:4px 12px;border-radius:8px;font-size:0.6rem;font-weight:600;cursor:pointer;transition:all 0.3s ease;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
        .auth-btn:active{transform:scale(0.90)}
        .auth-btn:hover{border-color:var(--gold);color:var(--gold)}
        .auth-btn.logged-in{background:linear-gradient(135deg,var(--gold),var(--orange));color:#0a0e1a;border-color:var(--gold);box-shadow:0 0 25px var(--gold-glow);padding:4px 14px}
        .auth-btn.logged-in:active{transform:scale(0.90)}
        .auth-btn.logged-in i{color:#0a0e1a}
        .auth-btn.logged-in img{width:20px;height:20px;border-radius:50%;object-fit:cover;margin-right:4px}

        .profile-section{text-align:center;margin-bottom:20px;animation:slideUp 0.6s ease}
        .profile-section .avatar-wrap{position:relative;width:80px;height:80px;margin:0 auto 10px}
        .profile-section .avatar-wrap .avatar{width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--orange));display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:#0a0e1a;border:3px solid var(--border-color);cursor:pointer;transition:all 0.3s ease;overflow:hidden;box-shadow:0 0 30px var(--gold-glow)}
        .profile-section .avatar-wrap .avatar:active{transform:scale(0.95)}
        .profile-section .avatar-wrap .avatar img{width:100%;height:100%;object-fit:cover}
        .profile-section .name{font-size:1.2rem;font-weight:700;color:var(--text-primary)}
        .profile-section .username{font-size:0.75rem;color:var(--text-secondary);margin-top:2px}
        .profile-section .status{font-size:0.6rem;color:var(--green);margin-top:4px}
        .profile-section .status i{margin-right:4px}

        .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;animation:slideUp 0.7s ease}
        .stats-grid .stat{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:14px;text-align:center;box-shadow:0 4px 20px var(--shadow)}
        .stats-grid .stat .number{font-size:1.3rem;font-weight:700;color:var(--gold);text-shadow:0 0 20px var(--gold-glow)}
        .stats-grid .stat .label{font-size:0.5rem;color:var(--text-secondary);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}

        .glass-card{background:var(--bg-card);backdrop-filter:blur(10px);border:1px solid var(--border-color);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 4px 25px var(--shadow);animation:slideUp 0.8s ease}
        .glass-card .label{font-size:0.6rem;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
        .glass-card .label i{color:var(--cyan);margin-right:4px}

        .menu-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-color);cursor:pointer;transition:all 0.3s ease}
        .menu-item:last-child{border-bottom:none}
        .menu-item:active{transform:scale(0.97);color:var(--gold)}
        .menu-item .icon{font-size:1rem;color:var(--text-secondary);width:24px;text-align:center}
        .menu-item .text{font-size:0.8rem;color:var(--text-primary);flex:1}
        .menu-item .arrow{color:var(--text-secondary);font-size:0.6rem}
        .menu-item .badge{font-size:0.45rem;background:rgba(245,200,66,0.12);color:var(--gold);padding:2px 10px;border-radius:10px;font-weight:600}

        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg-secondary);border-top:1px solid var(--border-color);display:flex;justify-content:space-around;padding:6px 0 10px;max-width:500px;margin:0 auto;z-index:100;border-radius:16px 16px 0 0;box-shadow:0 -8px 40px var(--shadow)}
        .bottom-nav .nav-item{text-align:center;cursor:pointer;text-decoration:none;color:var(--text-secondary);transition:all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);padding:4px 8px;border-radius:10px;position:relative}
        .bottom-nav .nav-item:active{transform:scale(0.75)}
        .bottom-nav .nav-item .icon{font-size:1.2rem;display:block;transition:all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)}
        .bottom-nav .nav-item .label{font-size:0.4rem;margin-top:1px;font-weight:700;letter-spacing:0.5px;transition:all 0.4s ease}
        .bottom-nav .nav-item.active{color:var(--gold)}
        .bottom-nav .nav-item.active .icon{transform:translateY(-6px) scale(1.15);text-shadow:0 0 30px var(--gold-glow)}
        .bottom-nav .nav-item.active .label{color:var(--gold)}
        .bottom-nav .nav-item.active::before{content:'';position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:24px;height:2.5px;background:linear-gradient(90deg,var(--gold),var(--orange));border-radius:10px;box-shadow:0 0 20px var(--gold-glow)}

        .footer-text{text-align:center;color:var(--text-secondary);font-size:0.45rem;margin-top:10px;opacity:0.3;letter-spacing:1px}

        .toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);background:var(--bg-card);padding:10px 20px;border-radius:12px;border:1px solid rgba(245,200,66,0.15);color:var(--gold);font-weight:600;font-size:0.75rem;display:none;z-index:200;text-align:center;max-width:90%;box-shadow:0 8px 40px var(--shadow);animation:toastPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)}
        .toast.show{display:block}
        @keyframes toastPop{from{opacity:0;transform:translateX(-50%) translateY(30px) scale(0.85)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        @keyframes shimmer{0%,100%{transform:translate(0,0)}50%{transform:translate(-20%,-20%)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo" id="appName"><i class="fas fa-gamepad"></i> Premium Game Shop</div>
        <div class="right">
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
                <button class="lang-btn" data-lang="my" onclick="setLang('my')">MY</button>
            </div>
            <div class="auth-btn" id="authBtn" onclick="handleAuthClick()">🔑 Login</div>
        </div>
    </div>

    <div class="profile-section">
        <div class="avatar-wrap">
            <div class="avatar" id="avatarDisplay">⚔️</div>
        </div>
        <div class="name" id="displayName">Guest</div>
        <div class="username" id="displayUsername">@guest</div>
        <div class="status"><i class="fas fa-circle"></i> <span id="statusText">Offline</span></div>
    </div>

    <div class="stats-grid">
        <div class="stat"><div class="number" id="diamondCount">0</div><div class="label" id="diamondLabel">💎 Diamonds</div></div>
        <div class="stat"><div class="number" id="orderCount">0</div><div class="label" id="orderLabel">📦 Orders</div></div>
    </div>

    <div class="glass-card">
        <span class="label"><i class="fas fa-cog"></i> <span id="settingsLabel">Settings</span></span>
        <div class="menu-item" onclick="editProfile()"><span class="icon">✏️</span><span class="text" id="editProfileText">Edit Profile</span><span class="arrow">›</span></div>
        <div class="menu-item" onclick="showToast('📜 Order history is empty')"><span class="icon">📜</span><span class="text" id="orderHistoryText">Order History</span><span class="badge" id="orderBadge">0</span><span class="arrow">›</span></div>
        <div class="menu-item" onclick="showToast('🔔 No notifications')"><span class="icon">🔔</span><span class="text" id="notiText">Notifications</span><span class="arrow">›</span></div>
        <div class="menu-item" onclick="logout()" style="border-bottom:none;"><span class="icon">🚪</span><span class="text" id="logoutText" style="color:var(--red);">Logout</span><span class="arrow">›</span></div>
    </div>

    <div class="glass-card">
        <span class="label"><i class="fas fa-info-circle"></i> <span id="aboutLabel">About</span></span>
        <div class="menu-item"><span class="icon">📱</span><span class="text" id="versionText">App Version 1.0.0</span><span class="arrow">›</span></div>
        <div class="menu-item"><span class="icon">❓</span><span class="text" id="helpText">Help & Support</span><span class="arrow">›</span></div>
        <div class="menu-item" style="border-bottom:none;"><span class="icon">📄</span><span class="text" id="termsText">Terms & Privacy</span><span class="arrow">›</span></div>
    </div>

    <div class="footer-text">&copy; 2026 Premium Game Shop</div>
</div>

<div class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="icon">🏠</span><span class="label" id="navHome">Home</span></a>
    <a href="shop.html" class="nav-item"><span class="icon">🛒</span><span class="label" id="navShop">Shop</span></a>
    <a href="payment.html" class="nav-item"><span class="icon">💳</span><span class="label" id="navPayment">Payment</span></a>
    <a href="profile.html" class="nav-item active"><span class="icon">👤</span><span class="label" id="navProfile">Profile</span></a>
</div>

<div class="toast" id="toast"></div>

<script>
    const LANG_DATA = {
        en: {
            appName: 'Premium Game Shop',
            statusOnline: '🟢 Online',
            statusOffline: '⚪ Offline',
            diamondLabel: '💎 Diamonds',
            orderLabel: '📦 Orders',
            settingsLabel: 'Settings',
            editProfileText: 'Edit Profile',
            orderHistoryText: 'Order History',
            notiText: 'Notifications',
            logoutText: 'Logout',
            aboutLabel: 'About',
            versionText: 'App Version 1.0.0',
            helpText: 'Help & Support',
            termsText: 'Terms & Privacy',
            home: 'Home', shop: 'Shop', payment: 'Payment', profile: 'Profile',
            login: 'Login',
            register: 'Register',
            modalLogin: '⚔️ Login',
            modalRegister: '🛡️ Register',
            modalLoginSub: 'Welcome back, warrior!',
            modalRegisterSub: 'Create your account, champion!',
            email: '📧 Email or Username',
            password: '🔑 Password',
            switchLogin: "Don't have an account? Register",
            switchRegister: 'Already have an account? Login',
            loginSuccess: '✅ Welcome back, Champion!',
            registerSuccess: '✅ Account created! Welcome!',
            logoutSuccess: '🚪 Logged out successfully!',
            logoutConfirm: 'Are you sure you want to logout?',
            enterEmail: 'Please enter your email or username',
            enterPassword: 'Please enter your password',
            enterUsername: 'Please enter your username',
            enterValidEmail: 'Please enter a valid email',
            passwordMin: 'Password must be at least 4 characters',
            passwordMatch: 'Passwords do not match',
            userExists: '❌ Username or email already exists',
            editName: 'Enter your name:',
            editUsername: 'Enter your username:'
        },
        my: {
            appName: 'ပရီမီယံ ဂိမ်းဆိုင်',
            statusOnline: '🟢 အွန်လိုင်း',
            statusOffline: '⚪ အော့ဖ်လိုင်း',
            diamondLabel: '💎 စိန်များ',
            orderLabel: '📦 အော်ဒါများ',
            settingsLabel: 'ပြင်ဆင်မှုများ',
            editProfileText: 'ပရိုဖိုင်ပြင်ရန်',
            orderHistoryText: 'အော်ဒါမှတ်တမ်း',
            notiText: 'အသိပေးချက်များ',
            logoutText: 'ထွက်ရန်',
            aboutLabel: 'အကြောင်း',
            versionText: 'App ဗားရှင်း 1.0.0',
            helpText: 'အကူအညီနှင့် ပံ့ပိုးမှု',
            termsText: 'စည်းကမ်းနှင့် ကိုယ်ရေးအချက်အလက်',
            home: 'ပင်မ', shop: 'ဆိုင်', payment: 'ငွေပေးချေ', profile: 'ပရိုဖိုင်',
            login: 'ဝင်ရန်',
            register: 'မှတ်ပုံတင်ရန်',
            modalLogin: '⚔️ ဝင်ရန်',
            modalRegister: '🛡️ မှတ်ပုံတင်ရန်',
            modalLoginSub: 'ပြန်လည်ကြိုဆိုပါတယ် စစ်သည်တော်!',
            modalRegisterSub: 'အကောင့်ဖွင့်ပါ ချန်ပီယံ!',
            email: '📧 အီးမေးလ် သို့မဟုတ် အသုံးပြုသူအမည်',
            password: '🔑 စကားဝှက်',
            switchLogin: 'အကောင့်မရှိသေးဘူး? မှတ်ပုံတင်ရန်',
            switchRegister: 'အကောင့်ရှိပြီးသား? ဝင်ရန်',
            loginSuccess: '✅ ကြိုဆိုပါတယ် ချန်ပီယံ!',
            registerSuccess: '✅ အကောင့်ဖွင့်ခြင်းအောင်မြင်ပါပြီ!',
            logoutSuccess: '🚪 ထွက်ခြင်းအောင်မြင်ပါပြီ!',
            logoutConfirm: 'ထွက်မှာသေချာလား?',
            enterEmail: 'ကျေးဇူးပြု၍ အီးမေးလ် သို့မဟုတ် အသုံးပြုသူအမည်ထည့်ပါ',
            enterPassword: 'ကျေးဇူးပြု၍ စကားဝှက်ထည့်ပါ',
            enterUsername: 'ကျေးဇူးပြု၍ အသုံးပြုသူအမည်ထည့်ပါ',
            enterValidEmail: 'ကျေးဇူးပြု၍ မှန်ကန်တဲ့ အီးမေးလ်ထည့်ပါ',
            passwordMin: 'စကားဝှက်သည် အနည်းဆုံး ၄ လုံးရှိရမယ်',
            passwordMatch: 'စကားဝှက်များ မတူညီပါ',
            userExists: '❌ အသုံးပြုသူအမည် သို့မဟုတ် အီးမေးလ် ရှိပြီးသားပါ',
            editName: 'သင့်နာမည်ထည့်ပါ:',
            editUsername: 'သင့်အသုံးပြုသူအမည်ထည့်ပါ:'
        }
    };

    let currentLang = localStorage.getItem('lang') || 'en';

    function getText(key) { return LANG_DATA[currentLang][key] || key; }

    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('lang', lang);
        updateLanguage();
        document.querySelectorAll('.lang-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.lang === lang);
        });
    }

    function updateLanguage() {
        const d = LANG_DATA[currentLang];
        document.getElementById('appName').innerHTML = '<i class="fas fa-gamepad"></i> ' + d.appName;
        document.getElementById('diamondLabel').textContent = d.diamondLabel;
        document.getElementById('orderLabel').textContent = d.orderLabel;
        document.getElementById('settingsLabel').innerHTML = '<i class="fas fa-cog"></i> ' + d.settingsLabel;
        document.getElementById('editProfileText').textContent = d.editProfileText;
        document.getElementById('orderHistoryText').textContent = d.orderHistoryText;
        document.getElementById('notiText').textContent = d.notiText;
        document.getElementById('logoutText').textContent = d.logoutText;
        document.getElementById('aboutLabel').innerHTML = '<i class="fas fa-info-circle"></i> ' + d.aboutLabel;
        document.getElementById('versionText').textContent = d.versionText;
        document.getElementById('helpText').textContent = d.helpText;
        document.getElementById('termsText').textContent = d.termsText;
        document.getElementById('navHome').textContent = d.home;
        document.getElementById('navShop').textContent = d.shop;
        document.getElementById('navPayment').textContent = d.payment;
        document.getElementById('navProfile').textContent = d.profile;
        updateAuthUI();
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ===== AUTH =====
    let currentUser = null;
    const savedUser = localStorage.getItem('currentUser');
    if (savedUser) currentUser = JSON.parse(savedUser);

    function isLoggedIn() { return currentUser !== null; }

    function updateAuthUI() {
        const authBtn = document.getElementById('authBtn');
        const nameEl = document.getElementById('displayName');
        const userEl = document.getElementById('displayUsername');
        const statusEl = document.getElementById('statusText');
        const avatarEl = document.getElementById('avatarDisplay');

        if (currentUser) {
            const savedAvatar = localStorage.getItem('userAvatar_' + currentUser.username);
            if (savedAvatar) {
                avatarEl.innerHTML = '<img src="' + savedAvatar + '" alt="avatar">';
            } else {
                avatarEl.textContent = '⚔️';
            }
            nameEl.textContent = currentUser.username || 'Guest';
            userEl.textContent = '@' + (currentUser.username || 'guest');
            statusEl.textContent = getText('statusOnline');
            authBtn.innerHTML = '👤 ' + currentUser.username;
            authBtn.className = 'auth-btn logged-in';
            authBtn.title = 'Go to Profile';
        } else {
            avatarEl.textContent = '⚔️';
            nameEl.textContent = 'Guest';
            userEl.textContent = '@guest';
            statusEl.textContent = getText('statusOffline');
            authBtn.innerHTML = '🔑 ' + getText('login');
            authBtn.className = 'auth-btn';
            authBtn.title = 'Login';
        }
    }

    function handleAuthClick() {
        if (isLoggedIn()) {
            // Already on profile page
        } else {
            window.location.href = 'index.html';
        }
    }

    // ===== PROFILE FUNCTIONS =====
    function editProfile() {
        if (!isLoggedIn()) {
            showToast('❌ Please login first');
            return;
        }
        const d = LANG_DATA[currentLang];
        const newName = prompt(d.editName, currentUser.username);
        if (newName !== null && newName.trim() !== '') {
            currentUser.username = newName.trim();
            const users = JSON.parse(localStorage.getItem('users') || '{}');
            if (users[currentUser.email]) {
                users[currentUser.email].username = newName.trim();
                localStorage.setItem('users', JSON.stringify(users));
            }
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            updateAuthUI();
            showToast('✅ Name updated!');
        }
        const newUsername = prompt(d.editUsername, currentUser.email);
        if (newUsername !== null && newUsername.trim() !== '') {
            const oldEmail = currentUser.email;
            const users = JSON.parse(localStorage.getItem('users') || '{}');
            if (users[oldEmail]) {
                users[newUsername.trim()] = users[oldEmail];
                users[newUsername.trim()].email = newUsername.trim();
                users[newUsername.trim()].username = currentUser.username;
                delete users[oldEmail];
                localStorage.setItem('users', JSON.stringify(users));
            }
            currentUser.email = newUsername.trim();
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            updateAuthUI();
            showToast('✅ Username updated!');
        }
    }

    function logout() {
        const d = LANG_DATA[currentLang];
        if (confirm(d.logoutConfirm)) {
            currentUser = null;
            localStorage.removeItem('currentUser');
            updateAuthUI();
            showToast(d.logoutSuccess);
            setTimeout(() => window.location.href = 'index.html', 1500);
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const savedLang = localStorage.getItem('lang') || 'en';
        setLang(savedLang);
        updateAuthUI();
    });
</script>
</body>
</html>
