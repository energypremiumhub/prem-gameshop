<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔔 Notifications</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
        :root{--bg-primary:#0a0e1a;--bg-secondary:#111927;--bg-card:#141c2b;--bg-input:#1a2438;--text-primary:#ffffff;--text-secondary:#8899bb;--border-color:rgba(255,255,255,0.06);--shadow:rgba(0,0,0,0.5);--gold:#f5c842;--gold-glow:rgba(245,200,66,0.3);--cyan:#00d4ff;--cyan-glow:rgba(0,212,255,0.2);--orange:#f97316;--orange-glow:rgba(249,115,22,0.2);--red:#ef4444;--green:#22d3ee;}
        body{background:var(--bg-primary);color:var(--text-primary);min-height:100vh;padding:16px;padding-bottom:90px}
        .container{max-width:500px;margin:0 auto}
        .header{display:flex;justify-content:space-between;align-items:center;padding:8px 0 14px}
        .header .back{color:var(--text-secondary);font-size:1.2rem;cursor:pointer;text-decoration:none}
        .header .back:active{transform:scale(0.85)}
        .header .title{font-size:1.1rem;font-weight:700;color:var(--gold);text-shadow:0 0 20px var(--gold-glow)}
        .noti-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
        .noti-item{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:14px;display:flex;align-items:flex-start;gap:12px;animation:slideUp 0.4s ease}
        .noti-item .icon{font-size:1.2rem;margin-top:2px;flex-shrink:0}
        .noti-item .icon.success{color:var(--green)}
        .noti-item .icon.pending{color:var(--gold)}
        .noti-item .icon.fail{color:var(--red)}
        .noti-item .content{flex:1}
        .noti-item .content .msg{font-size:0.8rem;color:var(--text-primary);white-space:pre-line}
        .noti-item .content .time{font-size:0.5rem;color:var(--text-secondary);margin-top:3px;opacity:0.5}
        .noti-item .content .order-id{font-size:0.55rem;color:var(--gold);margin-top:2px}
        .empty{text-align:center;padding:40px 0;color:var(--text-secondary)}
        .empty .icon{font-size:3rem;display:block;margin-bottom:10px;opacity:0.3}
        .clear-btn{background:var(--bg-input);border:1px solid var(--border-color);color:var(--text-secondary);padding:8px 20px;border-radius:10px;font-size:0.6rem;cursor:pointer;margin-top:10px;transition:all 0.3s ease}
        .clear-btn:active{transform:scale(0.95)}
        .clear-btn:hover{border-color:var(--red);color:var(--red)}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);background:var(--bg-card);padding:10px 20px;border-radius:12px;border:1px solid rgba(245,200,66,0.15);color:var(--gold);font-weight:600;font-size:0.75rem;display:none;z-index:200;text-align:center;max-width:90%;box-shadow:0 8px 40px var(--shadow)}
        .toast.show{display:block}
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg-secondary);border-top:1px solid var(--border-color);display:flex;justify-content:space-around;padding:6px 0 10px;max-width:500px;margin:0 auto;z-index:100;border-radius:16px 16px 0 0;box-shadow:0 -8px 40px var(--shadow)}
        .bottom-nav .nav-item{text-align:center;cursor:pointer;text-decoration:none;color:var(--text-secondary);transition:all 0.3s ease;padding:4px 8px;border-radius:8px;position:relative;border:2px solid transparent;min-width:50px}
        .bottom-nav .nav-item:active{transform:scale(0.85)}
        .bottom-nav .nav-item .icon{font-size:1.2rem;display:block}
        .bottom-nav .nav-item .label{font-size:0.4rem;margin-top:1px;font-weight:700;letter-spacing:0.5px}
        .bottom-nav .nav-item.active{color:var(--gold);border-color:var(--gold);background:rgba(245,200,66,0.05)}
        .bottom-nav .nav-item.active .icon{transform:translateY(-6px) scale(1.15);text-shadow:0 0 30px var(--gold-glow)}
        .bottom-nav .nav-item.active .label{color:var(--gold)}
        .bottom-nav .nav-item.active::before{content:'';position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:24px;height:2.5px;background:linear-gradient(90deg,var(--gold),var(--orange));border-radius:10px;box-shadow:0 0 20px var(--gold-glow)}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <a href="index.html" class="back"><i class="fas fa-arrow-left"></i></a>
        <span class="title"><i class="fas fa-bell"></i> အသိပေးချက်များ</span>
        <span style="width:24px;"></span>
    </div>

    <div class="noti-list" id="notiList"></div>

    <div style="text-align:center;margin-top:8px;">
        <button class="clear-btn" onclick="clearAllNotifications()">🗑️ အကုန်ရှင်းမည်</button>
    </div>

    <div class="toast" id="toast"></div>
</div>

<div class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="icon">🏠</span><span class="label">ပင်မ</span></a>
    <a href="shop.html" class="nav-item"><span class="icon">🛒</span><span class="label">ဆိုင်</span></a>
    <a href="payment.html" class="nav-item"><span class="icon">💳</span><span class="label">ငွေပေးချေ</span></a>
    <a href="profile.html" class="nav-item"><span class="icon">👤</span><span class="label">ပရိုဖိုင်</span></a>
</div>

<script>
    function showToast(msg){
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove('show'), 2000);
    }

    function renderNotifications(){
        const list = document.getElementById('notiList');
        const allNotis = JSON.parse(localStorage.getItem('allNotifications') || '[]');
        
        if(allNotis.length === 0){
            list.innerHTML = `
                <div class="empty">
                    <span class="icon">🔕</span>
                    <span>အသိပေးချက်မရှိပါ</span>
                </div>
            `;
            return;
        }

        list.innerHTML = allNotis.map(noti => {
            let icon = '📢';
            let iconClass = '';
            const msg = noti.message || '';
            
            if(msg.includes('အောင်မြင်ပါသည်') || msg.includes('completed') || msg.includes('စိန်ဖြည့်')){
                icon = '✅';
                iconClass = 'success';
            } else if(msg.includes('မအောင်မြင်ပါ') || msg.includes('failed')){
                icon = '❌';
                iconClass = 'fail';
            } else if(msg.includes('အော်ဒါအသစ်') || msg.includes('New order') || msg.includes('သင့်အော်ဒါ')){
                icon = '🛒';
                iconClass = 'pending';
            }
            
            const time = noti.time ? new Date(noti.time).toLocaleString() : new Date().toLocaleString();
            const orderId = noti.id || '';
            
            return `
                <div class="noti-item">
                    <span class="icon ${iconClass}">${icon}</span>
                    <div class="content">
                        <div class="msg">${msg}</div>
                        ${orderId ? `<div class="order-id">📋 ${orderId}</div>` : ''}
                        <div class="time">${time}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function clearAllNotifications(){
        if(confirm('အသိပေးချက်အကုန်လုံးကို ရှင်းပစ်မှာလား?')){
            localStorage.setItem('allNotifications', JSON.stringify([]));
            localStorage.setItem('newOrderNotification', JSON.stringify({show: false}));
            renderNotifications();
            showToast('🗑️ အကုန်ရှင်းပြီးပါပြီ');
        }
    }

    // Listen for new notifications
    window.addEventListener('storage', function(e) {
        if(e.key === 'newOrderNotification' || e.key === 'allNotifications'){
            renderNotifications();
        }
    });

    document.addEventListener('DOMContentLoaded', function(){
        renderNotifications();
    });
</script>
</body>
</html>
