<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔔 Notifications</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
        
        :root {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255,255,255,0.6);
            --bg-input: rgba(255,255,255,0.7);
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --border-color: rgba(0,0,0,0.06);
            --shadow: rgba(0,0,0,0.06);
            --cyan: #00b4d8;
            --cyan-glow: rgba(0,180,216,0.2);
            --purple: #7c3aed;
            --violet: #8b5cf6;
            --pink: #ec4899;
            --gold: #f5a623;
            --red: #ff0044;
            --green: #00c853;
        }

        .night-mode {
            --bg-primary: #0d0d1a;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(30,30,60,0.5);
            --bg-input: rgba(40,40,80,0.5);
            --text-primary: #e8eaf0;
            --text-secondary: #a8a8c8;
            --border-color: rgba(255,255,255,0.06);
            --shadow: rgba(0,0,0,0.3);
            --gold: #ffd700;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 90px;
            transition: all 0.4s ease;
        }
        .container{max-width:480px;margin:0 auto}

        .header{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0 14px;flex-wrap:wrap;gap:6px}
        .header .left .logo-wrap{display:flex;align-items:center;gap:10px}
        .header .left .logo-wrap img{height:38px;width:auto;border-radius:10px}
        .header .left .logo-wrap .text-group{display:flex;flex-direction:column;line-height:1.1}
        .header .left .logo-wrap .text-group .premium{
            font-size:1rem;font-weight:800;
            background:linear-gradient(135deg, var(--cyan), var(--purple), var(--violet), var(--pink));
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            background-size:300% 300%;animation:colorShift 2s ease-in-out infinite
        }
        @keyframes colorShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .header .left .logo-wrap .text-group .shop{font-size:0.55rem;font-weight:600;color:var(--text-secondary);opacity:0.6;margin-top:-2px}

        .header .right .top{display:flex;gap:6px;align-items:center}
        .lang-switcher{
            display:flex;gap:2px;background:var(--bg-card);padding:3px;border-radius:10px;
            border:1px solid var(--border-color);backdrop-filter:blur(20px)
        }
        .lang-btn{
            background:transparent;border:none;color:var(--text-secondary);padding:3px 10px;
            border-radius:6px;font-size:0.5rem;font-weight:700;cursor:pointer;text-transform:uppercase;
            transition:all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)
        }
        .lang-btn:active{transform:scale(0.92)!important}
        .lang-btn.active{
            background:linear-gradient(135deg,var(--cyan),var(--purple),var(--violet));
            color:#fff;box-shadow:0 4px 15px rgba(0,180,216,0.3)
        }
        .night-toggle{
            background:var(--bg-card);border:1px solid var(--border-color);border-radius:10px;
            width:34px;height:34px;display:flex;align-items:center;justify-content:center;
            cursor:pointer;font-size:1.1rem;color:var(--text-secondary);backdrop-filter:blur(20px);
            transition:all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)
        }
        .night-toggle:active{transform:scale(0.92)!important}
        .night-mode .night-toggle .fa-sun{color:#ffd700}

        .page-header{margin-bottom:16px;animation:slideUp 0.6s ease}
        .page-header h1{font-size:1.3rem;font-weight:800;color:var(--text-primary)}
        .page-header h1 span{
            background:linear-gradient(135deg,var(--cyan),var(--purple),var(--violet),var(--pink));
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            background-size:300% 300%;animation:gradientMove 2s ease-in-out infinite
        }
        @keyframes gradientMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .page-header h1 i{color:var(--cyan);margin-right:6px}

        .clear-all-btn{
            display:flex;justify-content:flex-end;margin-bottom:10px
        }
        .clear-all-btn button{
            background:transparent;border:1px solid var(--border-color);color:var(--text-secondary);
            padding:4px 12px;border-radius:8px;font-size:0.6rem;cursor:pointer;
            transition:all 0.3s ease
        }
        .clear-all-btn button:active{transform:scale(0.92)!important}

        .noti-card{
            background:var(--bg-card);backdrop-filter:blur(20px);border:1px solid var(--border-color);
            border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 4px 20px var(--shadow);
            animation:slideUp 0.6s ease;border-left:4px solid #00b4d8
        }
        @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .noti-card.pending{border-left-color:var(--gold)}
        .noti-card.completed{border-left-color:var(--green)}
        .noti-card.failed{border-left-color:var(--red)}
        .noti-card.reply{border-left-color:var(--violet)}
        .noti-card.info{border-left-color:var(--cyan)}
        
        .noti-card .noti-header{display:flex;gap:10px;align-items:flex-start}
        .noti-card .noti-icon{
            width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
            justify-content:center;font-size:0.9rem;color:#fff;flex-shrink:0
        }
        .noti-card.pending .noti-icon{background:linear-gradient(135deg,#f5a623,#ff6a00)}
        .noti-card.completed .noti-icon{background:linear-gradient(135deg,#00c853,#00e676)}
        .noti-card.failed .noti-icon{background:linear-gradient(135deg,#ff0044,#ff6b6b)}
        .noti-card.reply .noti-icon{background:linear-gradient(135deg,#7c3aed,#a855f7)}
        .noti-card.info .noti-icon{background:linear-gradient(135deg,#00b4d8,#48cae4)}
        
        .noti-card .noti-content{flex:1}
        .noti-card .noti-text{font-size:0.7rem;line-height:1.4;white-space:pre-line}
        .noti-card .noti-time{font-size:0.55rem;color:var(--text-secondary);margin-top:4px}

        /* Reply Form */
        .reply-form{
            display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border-color)
        }
        .reply-form input{
            flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--border-color);
            background:var(--bg-input);color:var(--text-primary);font-size:0.65rem;outline:none
        }
        .reply-form input:focus{border-color:var(--cyan);box-shadow:0 0 10px var(--cyan-glow)}
        .reply-form button{
            background:linear-gradient(135deg,var(--cyan),var(--purple));
            color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:0.65rem;
            font-weight:600;cursor:pointer;box-shadow:0 4px 15px rgba(0,180,216,0.3)
        }
        .reply-form button:active{transform:scale(0.92)!important}

        /* Replies inside card */
        .replies-list{margin-top:6px}
        .replies-list .r-item{
            padding:4px 8px;border-radius:6px;font-size:0.6rem;margin-bottom:3px;
            background:var(--bg-input)
        }
        .replies-list .r-item .r-from{font-weight:600}

        .empty{text-align:center;color:var(--text-secondary);padding:40px;font-size:0.8rem}
        .footer-text{text-align:center;color:var(--text-secondary);font-size:0.45rem;margin-top:20px;opacity:0.3}

        .bottom-nav{
            position:fixed;bottom:16px;left:16px;right:16px;width:auto;max-width:480px;margin:0 auto;
            background:var(--bg-card);backdrop-filter:blur(24px);border:1px solid var(--border-color);
            border-radius:18px;display:flex;justify-content:space-around;padding:8px 4px;z-index:100;
            box-shadow:0 4px 30px var(--shadow)
        }
        .bottom-nav .nav-item{
            text-align:center;cursor:pointer;text-decoration:none;color:var(--text-secondary);
            padding:6px 12px;border-radius:12px;min-width:48px;border:1px solid transparent;
            display:flex;flex-direction:column;align-items:center;gap:1px
        }
        .bottom-nav .nav-item:active{transform:scale(0.88)!important}
        .bottom-nav .nav-item .icon{font-size:1.2rem;position:relative}
        .bottom-nav .nav-item .label{font-size:0.4rem;opacity:0.5}
        .bottom-nav .nav-item.active{
            background:rgba(0,180,216,0.08);border:1px solid rgba(0,180,216,0.12)
        }
        .bottom-nav .nav-item.active .icon{
            background:linear-gradient(135deg,var(--cyan),var(--purple));
            -webkit-background-clip:text;-webkit-text-fill-color:transparent
        }
        .bottom-nav .nav-item.active .label{
            background:linear-gradient(135deg,var(--cyan),var(--purple));
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:1;font-weight:600
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="left">
            <div class="logo-wrap">
                <img src="https://files.catbox.moe/lmq98x.jpg" alt="Logo">
                <div class="text-group">
                    <span class="premium" id="appName">Premium</span>
                    <span class="shop" id="appSub">Game Shop</span>
                </div>
            </div>
        </div>
        <div class="right">
            <div class="top">
                <div class="lang-switcher">
                    <button class="lang-btn active" data-lang="my">မြန်မာ</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
                <button class="night-toggle"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </div>

    <div class="page-header">
        <h1><i class="fas fa-bell"></i> <span id="pageTitle">သတိပေးချက်များ</span></h1>
    </div>

    <div class="clear-all-btn">
        <button onclick="clearAll()"><i class="fas fa-trash-alt"></i> <span id="clearAllText">အကုန်ဖျက်မည်</span></button>
    </div>

    <div id="notiContainer"><div class="empty" id="emptyText">သတိပေးချက် မရှိသေးပါ</div></div>

    <div class="footer-text">&copy; 2026 Premium Game Shop</div>
</div>

<div class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="icon"><i class="fas fa-home"></i></span><span class="label" id="navHome">ပင်မ</span></a>
    <a href="shop.html" class="nav-item"><span class="icon"><i class="fas fa-shopping-bag"></i></span><span class="label" id="navShop">ဆိုင်</span></a>
    <a href="notifications.html" class="nav-item active"><span class="icon"><i class="fas fa-bell"></i></span><span class="label" id="navNoti">နိုတီ</span></a>
    <a href="profile.html" class="nav-item"><span class="icon"><i class="fas fa-user"></i></span><span class="label" id="navProfile">ပရိုဖိုင်</span></a>
</div>

<script>
const TELEGRAM_BOT_TOKEN = '8751360822:AAFQNiWhfGWgUsjD7Bd5DzfHMfpkR4COHY8';
const TELEGRAM_CHAT_ID = '8745522082';

const LANG_DATA = {
    my: {
        appName:'Premium',appSub:'Game Shop',
        home:'ပင်မ',shop:'ဆိုင်',noti:'နိုတီ',profile:'ပရိုဖိုင်',
        pageTitle:'သတိပေးချက်များ',empty:'သတိပေးချက် မရှိသေးပါ',
        clearAll:'အကုန်ဖျက်မည်',cleared:'✅ အကုန်ဖျက်ပြီး',
        replyPlaceholder:'စာပြန်ရန်...',replyBtn:'ပို့မည်'
    },
    en: {
        appName:'Premium',appSub:'Game Shop',
        home:'Home',shop:'Shop',noti:'Noti',profile:'Profile',
        pageTitle:'Notifications',empty:'No notifications yet',
        clearAll:'Clear All',cleared:'✅ Cleared all',
        replyPlaceholder:'Reply...',replyBtn:'Send'
    }
};

let currentLang = localStorage.getItem('lang') || 'my';
function getText(key){return LANG_DATA[currentLang]?.[key]||key}

function updateLanguage(){
    const d=LANG_DATA[currentLang];
    document.getElementById('appName').textContent=d.appName;
    document.getElementById('appSub').textContent=d.appSub;
    document.getElementById('pageTitle').textContent=d.pageTitle;
    document.getElementById('emptyText').textContent=d.empty;
    document.getElementById('clearAllText').textContent=d.clearAll;
    document.getElementById('navHome').textContent=d.home;
    document.getElementById('navShop').textContent=d.shop;
    document.getElementById('navNoti').textContent=d.noti;
    document.getElementById('navProfile').textContent=d.profile;
    loadNotifications();
}

function toggleNightMode(){
    document.body.classList.toggle('night-mode');
    const icon=document.querySelector('.night-toggle i');
    icon.className=document.body.classList.contains('night-mode')?'fas fa-sun':'fas fa-moon';
    localStorage.setItem('nightMode',document.body.classList.contains('night-mode')?'true':'false');
}

function loadNotifications(){
    const notis=JSON.parse(localStorage.getItem('notifications')||'[]');
    const container=document.getElementById('notiContainer');
    const d=LANG_DATA[currentLang];
    
    if(notis.length===0){
        container.innerHTML=`<div class="empty">${d.empty}</div>`;
        return;
    }
    
    // Order history က replies တွေကို ဆွဲထုတ်
    const orders=JSON.parse(localStorage.getItem('orderHistory')||'[]');
    
    container.innerHTML=notis.map(n=>{
        let typeClass=n.type==='reply'?'reply':(n.status||'info');
        let icon='';
        switch(typeClass){
            case 'pending':icon='⏳';break;
            case 'completed':icon='✅';break;
            case 'failed':icon='❌';break;
            case 'reply':icon='💬';break;
            default:icon='🔔';
        }
        
        // ဒီ order ရဲ့ replies တွေရှာ
        const order=orders.find(o=>o.id===n.orderId);
        const replies=order?.replies||[];
        
        let repliesHTML='';
        if(replies.length>0){
            repliesHTML='<div class="replies-list">'+replies.map(r=>`
                <div class="r-item">
                    <span class="r-from">${r.from==='Admin'||r.from===undefined?'Admin':r.from}:</span> ${r.text}
                    <small>(${new Date(r.time).toLocaleString()})</small>
                </div>
            `).join('')+'</div>';
        }
        
        // ဆောင်ရွက်ဆဲ order တွေမှာပဲ reply form ပြ
        let replyFormHTML='';
        if(n.orderId && (typeClass==='pending'||typeClass==='reply'||typeClass==='info')){
            replyFormHTML=`
                <div class="reply-form">
                    <input type="text" placeholder="${d.replyPlaceholder}" id="reply-${n.orderId}">
                    <button onclick="userReply('${n.orderId}')">${d.replyBtn}</button>
                </div>`;
        }
        
        return `
            <div class="noti-card ${typeClass}">
                <div class="noti-header">
                    <div class="noti-icon">${icon}</div>
                    <div class="noti-content">
                        <div class="noti-text">${n.message}</div>
                        <div class="noti-time">🕐 ${n.time||''}</div>
                    </div>
                </div>
                ${repliesHTML}
                ${replyFormHTML}
            </div>
        `;
    }).join('');
}

async function userReply(orderId){
    const input=document.getElementById(`reply-${orderId}`);
    const message=input.value.trim();
    if(!message)return;
    
    const user=JSON.parse(localStorage.getItem('currentUser'));
    const userName=user?user.username:'Guest';
    
    // Update order
    const orders=JSON.parse(localStorage.getItem('orderHistory')||'[]');
    const order=orders.find(o=>o.id===orderId);
    if(order){
        if(!order.replies)order.replies=[];
        order.replies.push({text:message,time:new Date().toISOString(),from:userName});
        localStorage.setItem('orderHistory',JSON.stringify(orders));
    }
    
    // Send to Telegram
    try{
        const tgMessage=`💬 User Reply
━━━━━━━━━━━━━━━━━
👤 ${userName}
📋 Order: ${orderId}
📦 ${order?.package||'N/A'}
━━━━━━━━━━━━━━━━━
📝 ${message}`;
        
        await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({chat_id:TELEGRAM_CHAT_ID,text:tgMessage})
        });
    }catch(e){console.warn('Telegram error:',e);}
    
    // Add notification
    const notis=JSON.parse(localStorage.getItem('notifications')||'[]');
    notis.unshift({
        id:'reply_'+Date.now(),
        orderId:orderId,
        type:'reply',
        from:userName,
        message:`💬 ${userName} မှ စာပြန်သည် #${orderId}: ${message}`,
        time:new Date().toLocaleString(),
        status:'info'
    });
    localStorage.setItem('notifications',JSON.stringify(notis));
    window.dispatchEvent(new Event('storage'));
    
    input.value='';
    loadNotifications();
}

function clearAll(){
    localStorage.setItem('notifications','[]');
    loadNotifications();
    window.dispatchEvent(new Event('storage'));
}

document.addEventListener('DOMContentLoaded',()=>{
    const savedLang=localStorage.getItem('lang')||'my';
    currentLang=savedLang;
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===savedLang));
    updateLanguage();
    if(localStorage.getItem('nightMode')==='true'){
        document.body.classList.add('night-mode');
        document.querySelector('.night-toggle i').className='fas fa-sun';
    }
});

document.querySelectorAll('.lang-btn').forEach(b=>{
    b.addEventListener('click',function(){
        currentLang=this.dataset.lang;
        localStorage.setItem('lang',currentLang);
        document.querySelectorAll('.lang-btn').forEach(b2=>b2.classList.toggle('active',b2.dataset.lang===currentLang));
        updateLanguage();
    });
});

document.querySelector('.night-toggle').addEventListener('click',toggleNightMode);
window.addEventListener('storage',()=>loadNotifications());
</script>
</body>
</html>
