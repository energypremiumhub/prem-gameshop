<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔔 Notifications</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
        
        :root {
            --bg-primary: #08081a;
            --bg-secondary: #0c0c24;
            --bg-card: #141c2b;
            --bg-input: #1a2438;
            --text-primary: #ffffff;
            --text-secondary: #8899bb;
            --border-color: rgba(255,255,255,0.08);
            --shadow: rgba(0,0,0,0.6);
            --gold: #ffd700;
            --gold-glow: rgba(255,215,0,0.3);
            --cyan: #00e5ff;
            --cyan-glow: rgba(0,229,255,0.2);
            --orange: #ff6a00;
            --orange-glow: rgba(255,106,0,0.2);
            --red: #ff0044;
            --red-glow: rgba(255,0,68,0.4);
            --green: #00ff87;
            --green-glow: rgba(0,255,135,0.2);
            --pink: #ff2d78;
            --pink-glow: rgba(255,45,120,0.2);
            --purple: #b388ff;
            --purple-glow: rgba(179,136,255,0.2);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 90px;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(255,215,0,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(0,229,255,0.04) 0%, transparent 50%);
        }

        ::-webkit-scrollbar{width:0px;height:0px}
        .container{max-width:500px;margin:0 auto}

        /* ===== HEADER ===== */
        .header{display:flex;justify-content:space-between;align-items:center;padding:8px 0 14px}
        .header .back{color:var(--text-secondary);font-size:1.2rem;cursor:pointer;text-decoration:none}
        .header .back:active{transform:scale(0.85)}
        .header .title{font-size:1.1rem;font-weight:700;color:var(--gold);text-shadow:0 0 20px var(--gold-glow)}
        .header .title i{color:var(--cyan);margin-right:6px}
        
        .header .right{display:flex;gap:8px;align-items:center}
        .header .right .lang-switcher{display:flex;gap:2px;background:var(--bg-card);padding:3px;border-radius:10px;border:2px solid var(--border-color)}
        .header .right .lang-switcher .lang-btn{background:transparent;border:none;color:var(--text-secondary);padding:3px 10px;border-radius:6px;font-size:0.5rem;font-weight:700;cursor:pointer;transition:all 0.2s ease;text-transform:uppercase}
        .header .right .lang-switcher .lang-btn.active{background:var(--gold);color:#0a0e1a;box-shadow:0 0 20px var(--gold-glow)}
        .header .right .lang-switcher .lang-btn:active{transform:scale(0.85)}
        
        .header .right .noti-btn{background:var(--bg-card);border:2px solid var(--border-color);border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s ease;font-size:1rem;color:var(--text-secondary);position:relative;text-decoration:none}
        .header .right .noti-btn:active{transform:scale(0.85)}
        .header .right .noti-btn .badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:0.4rem;font-weight:700;padding:1px 6px;border-radius:50%;display:none;box-shadow:0 0 15px var(--red-glow)}

        /* ===== NOTIFICATION LIST ===== */
        .noti-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
        .noti-item{background:var(--bg-card);border:2px solid var(--border-color);border-radius:14px;padding:14px;display:flex;align-items:flex-start;gap:12px;animation:slideUp 0.4s ease;box-shadow:0 4px 25px var(--shadow)}
        .noti-item .icon{font-size:1.2rem;margin-top:2px;flex-shrink:0}
        .noti-item .icon.success{color:var(--green)}
        .noti-item .icon.pending{color:var(--gold)}
        .noti-item .icon.fail{color:var(--red)}
        .noti-item .content{flex:1}
        .noti-item .content .msg{font-size:0.8rem;color:var(--text-primary);white-space:pre-line}
        .noti-item .content .time{font-size:0.5rem;color:var(--text-secondary);margin-top:3px;opacity:0.5}
        .noti-item .content .order-id{font-size:0.55rem;color:var(--gold);margin-top:2px}
        
        .empty{text-align:center;padding:40px 0;color:var(--text-secondary)}
        .empty .icon{font-size:3rem;display:block;margin-bottom:10px;opacity:0.3}
        
        .clear-btn{background:var(--bg-input);border:2px solid var(--border-color);color:var(--text-secondary);padding:8px 20px;border-radius:10px;font-size:0.6rem;cursor:pointer;margin-top:10px;transition:all 0.3s ease}
        .clear-btn:active{transform:scale(0.95)}
        .clear-btn:hover{border-color:var(--red);color:var(--red)}

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111927;
            backdrop-filter: blur(20px);
            border-top: 2px solid rgba(255,255,255,0.06);
            border-radius: 16px 16px 0 0;
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            max-width: 500px;
            margin: 0 auto;
            z-index: 100;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
        }
        .bottom-nav .nav-item {
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            padding: 6px 16px;
            border-radius: 12px;
            position: relative;
            min-width: 56px;
            border: 2px solid transparent;
        }
        .bottom-nav .nav-item .icon{font-size:1.2rem;display:block;transition:all 0.3s ease}
        .bottom-nav .nav-item .label{font-size:0.4rem;margin-top:2px;font-weight:700;letter-spacing:0.5px;transition:all 0.3s ease}
        .bottom-nav .nav-item.active {
            color: var(--gold);
            background: rgba(255,215,0,0.08);
            border-color: rgba(255,215,0,0.2);
            box-shadow: 0 0 30px rgba(255,215,0,0.08);
        }
        .bottom-nav .nav-item.active .icon{transform:translateY(-2px);color:var(--gold)}
        .bottom-nav .nav-item.active .label{color:var(--gold)}
        .bottom-nav .nav-item:not(.active):hover {
            border-color: rgba(255,255,255,0.04);
            background: rgba(255,255,255,0.02);
        }

        .toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);background:var(--bg-card);padding:10px 20px;border-radius:12px;border:2px solid rgba(255,215,0,0.15);color:var(--gold);font-weight:600;font-size:0.75rem;display:none;z-index:200;text-align:center;max-width:90%;box-shadow:0 8px 40px var(--shadow);animation:toastPop 0.3s cubic-bezier(0.34,1.2,0.64,1)}
        .toast.show{display:block}
        @keyframes toastPop{from{opacity:0;transform:translateX(-50%) translateY(30px) scale(0.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    </style>
</head>
<body>
<div class="container">
    <!-- ===== HEADER ===== -->
    <div class="header">
        <a href="index.html" class="back"><i class="fas fa-arrow-left"></i></a>
        <span class="title"><i class="fas fa-bell"></i> <span id="pageTitle">အသိပေးချက်များ</span></span>
        <div class="right">
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="my" onclick="setLang('my')">မြန်မာ</button>
                <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
            </div>
        </div>
    </div>

    <!-- ===== NOTIFICATION LIST ===== -->
    <div class="noti-list" id="notiList"></div>

    <div style="text-align:center;margin-top:8px;">
        <button class="clear-btn" onclick="clearAllNotifications()">🗑️ <span id="clearBtnText">အကုန်ရှင်းမည်</span></button>
    </div>

    <div class="toast" id="toast"></div>
</div>

<!-- ===== BOTTOM NAV ===== -->
<div class="bottom-nav">
    <a href="index.html" class="nav-item active"><span class="icon">🏠</span><span class="label" id="navHome">ပင်မ</span></a>
    <a href="shop.html" class="nav-item"><span class="icon">🛒</span><span class="label" id="navShop">ဆိုင်</span></a>
    <a href="payment.html" class="nav-item"><span class="icon">💳</span><span class="label" id="navPayment">ငွေပေးချေ</span></a>
    <a href="profile.html" class="nav-item"><span class="icon">👤</span><span class="label" id="navProfile">ပရိုဖိုင်</span></a>
</div>

<script>
    // ===== LANGUAGE DATA =====
    const LANG_DATA = {
        my: {
            pageTitle: 'အသိပေးချက်များ',
            clearBtn: 'အကုန်ရှင်းမည်',
            noNotifications: 'အသိပေးချက်မရှိပါ',
            home: 'ပင်မ', shop: 'ဆိုင်', payment: 'ငွေပေးချေ', profile: 'ပရိုဖိုင်',
            clearConfirm: 'အသိပေးချက်အကုန်လုံးကို ရှင်းပစ်မှာလား?',
            cleared: '🗑️ အကုန်ရှင်းပြီးပါပြီ'
        },
        en: {
            pageTitle: 'Notifications',
            clearBtn: 'Clear All',
            noNotifications: 'No notifications',
            home: 'Home', shop: 'Shop', payment: 'Payment', profile: 'Profile',
            clearConfirm: 'Clear all notifications?',
            cleared: '🗑️ All cleared!'
        }
    };

    let currentLang = localStorage.getItem('lang') || 'my';

    function getText(key){ return LANG_DATA[currentLang][key] || key; }

    function setLang(lang){
        currentLang = lang;
        localStorage.setItem('lang', lang);
        updateLanguage();
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    }

    function updateLanguage(){
        const d = LANG_DATA[currentLang];
        document.getElementById('pageTitle').textContent = d.pageTitle;
        document.getElementById('clearBtnText').textContent = d.clearBtn;
        document.getElementById('navHome').textContent = d.home;
        document.getElementById('navShop').textContent = d.shop;
        document.getElementById('navPayment').textContent = d.payment;
        document.getElementById('navProfile').textContent = d.profile;
        renderNotifications();
    }

    function showToast(msg){
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove('show'), 2000);
    }

    function renderNotifications(){
        const list = document.getElementById('notiList');
        const allNotis = JSON.parse(localStorage.getItem('allNotifications') || '[]');
        const d = LANG_DATA[currentLang];
        
        if(allNotis.length === 0){
            list.innerHTML = `
                <div class="empty">
                    <span class="icon">🔕</span>
                    <span>${d.noNotifications || 'No notifications'}</span>
                </div>
            `;
            return;
        }

        list.innerHTML = allNotis.map(noti => {
            let icon = '📢';
            let iconClass = '';
            const msg = noti.message || '';
            
            if(msg.includes('အောင်မြင်ပါသည်') || msg.includes('completed') || msg.includes('စိန်ဖြည့်')){
                icon = '✅';
                iconClass = 'success';
            } else if(msg.includes('မအောင်မြင်ပါ') || msg.includes('failed')){
                icon = '❌';
                iconClass = 'fail';
            } else if(msg.includes('အော်ဒါအသစ်') || msg.includes('New order') || msg.includes('သင့်အော်ဒါ')){
                icon = '🛒';
                iconClass = 'pending';
            }
            
            const time = noti.time ? new Date(noti.time).toLocaleString() : new Date().toLocaleString();
            const orderId = noti.id || '';
            
            return `
                <div class="noti-item">
                    <span class="icon ${iconClass}">${icon}</span>
                    <div class="content">
                        <div class="msg">${msg}</div>
                        ${orderId ? `<div class="order-id">📋 ${orderId}</div>` : ''}
                        <div class="time">${time}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function clearAllNotifications(){
        const d = LANG_DATA[currentLang];
        if(confirm(d.clearConfirm || 'Clear all notifications?')){
            localStorage.setItem('allNotifications', JSON.stringify([]));
            localStorage.setItem('newOrderNotification', JSON.stringify({show: false}));
            renderNotifications();
            showToast(d.cleared || '🗑️ All cleared!');
        }
    }

    // Listen for new notifications
    window.addEventListener('storage', function(e) {
        if(e.key === 'newOrderNotification' || e.key === 'allNotifications'){
            renderNotifications();
        }
    });

    document.addEventListener('DOMContentLoaded', function(){
        setLang(localStorage.getItem('lang') || 'my');
        renderNotifications();
    });
</script>
</body>
</html>
