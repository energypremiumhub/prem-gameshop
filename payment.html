<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prem-Game Shop - Payment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        
        :root {
            --bg: #0a0e1a;
            --bg2: #111827;
            --bg3: #1a2332;
            --text: #ffffff;
            --text2: #94a3b8;
            --border: rgba(255,255,255,0.06);
            --shadow: rgba(0,0,0,0.4);
            --gold: #f5c842;
            --orange: #f97316;
            --green: #22d3ee;
            --wave: #0066cc;
            --kpay: #00a651;
        }

        body.light {
            --bg: #f0f2f5;
            --bg2: #ffffff;
            --bg3: #e8eaed;
            --text: #1a1a2e;
            --text2: #555770;
            --border: rgba(0,0,0,0.08);
            --shadow: rgba(0,0,0,0.08);
            --gold: #d4a020;
            --orange: #e8850a;
            --green: #0f9d58;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 90px;
            transition: all 0.3s ease;
        }

        .container{max-width:500px;margin:0 auto}

        .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;border-bottom:1px solid var(--border);margin-bottom:20px}
        .topbar .back-btn{color:var(--gold);text-decoration:none;font-size:0.8rem;font-weight:600;padding:6px 14px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);transition:all 0.3s ease}
        .topbar .back-btn:active{transform:scale(0.92);background:var(--gold);color:#0a0e1a}
        .topbar .page-title{font-size:1.1rem;font-weight:700;color:var(--gold)}
        .topbar .spacer{width:70px}

        .page-header{margin-bottom:24px}
        .page-header h1{font-size:1.4rem;font-weight:700;color:var(--text)}
        .page-header h1 span{background:linear-gradient(135deg,var(--gold),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .page-header p{color:var(--text2);font-size:0.8rem;margin-top:2px}

        .glass-card{background:var(--bg3);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:0 4px 25px var(--shadow)}
        .glass-card .label{font-size:0.7rem;color:var(--text2);font-weight:600;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}

        .payment-account{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:12px;border:1px solid var(--border);margin-bottom:10px;transition:all 0.3s ease;background:var(--bg)}
        .payment-account:active{transform:scale(0.97)}
        .payment-account .icon-box{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;font-weight:700;border:1px solid var(--border)}
        .payment-account .icon-box.wave{background:rgba(0,102,204,0.12);color:#0066cc;border-color:rgba(0,102,204,0.15)}
        .payment-account .icon-box.kpay{background:rgba(0,166,81,0.12);color:#00a651;border-color:rgba(0,166,81,0.15)}
        .payment-account .icon-box .wave-text{font-size:1rem}
        .payment-account .icon-box .kpay-text{font-size:0.8rem;font-weight:800}
        .payment-account .info{flex:1}
        .payment-account .info .name{font-size:0.85rem;font-weight:600;color:var(--text)}
        .payment-account .info .number{font-size:0.75rem;color:var(--text2);margin-top:2px}
        .payment-account .info .number i{margin-right:4px;color:var(--green)}
        .payment-account .info .holder{font-size:0.65rem;color:var(--green);margin-top:2px;opacity:0.8}

        .copy-btn{background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:4px 12px;border-radius:16px;font-size:0.55rem;cursor:pointer;transition:all 0.3s ease;font-weight:600}
        .copy-btn:active{transform:scale(0.90);background:var(--gold);color:#0a0e1a}
        .copy-btn.copied{background:rgba(34,211,238,0.15);border-color:var(--green);color:var(--green)}

        .instruction-list{display:flex;flex-direction:column;gap:8px}
        .instruction-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg);border-radius:10px;border:1px solid var(--border)}
        .instruction-item .step{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--orange));color:#0a0e1a;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.65rem;flex-shr
