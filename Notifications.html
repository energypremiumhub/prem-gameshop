<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ Premium Game Shop - Notifications</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="lang.js"></script>
    <script src="auth.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
        
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111927;
            --bg-card: #141c2b;
            --bg-input: #1a2438;
            --text-primary: #ffffff;
            --text-secondary: #8899bb;
            --border-color: rgba(255,255,255,0.06);
            --shadow: rgba(0,0,0,0.5);
            --gold: #f5c842;
            --gold-glow: rgba(245,200,66,0.3);
            --cyan: #00d4ff;
            --cyan-glow: rgba(0,212,255,0.2);
            --pink: #ff6b9d;
            --orange: #f97316;
            --orange-glow: rgba(249,115,22,0.2);
            --green: #22d3ee;
            --green-glow: rgba(34,211,238,0.2);
            --red: #ef4444;
            --purple: #8b5cf6;
            --purple-glow: rgba(139,92,246,0.2);
            --warning: #f59e0b;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 90px;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(245,200,66,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(0,212,255,0.04) 0%, transparent 50%);
        }

        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:var(--bg-primary)}
        ::-webkit-scrollbar-thumb{background:var(--gold);border-radius:10px}

        .container{max-width:500px;margin:0 auto}

        .header{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0 14px;flex-wrap:wrap;gap:6px}
        .header .left{display:flex;flex-direction:column;gap:6px}
        .header .left .logo{font-size:1rem;font-weight:800;color:var(--gold);text-shadow:0 0 20px var(--gold-glow);letter-spacing:0.5px}
        .header .left .logo i{color:var(--cyan);margin-right:6px;text-shadow:0 0 20px var(--cyan-glow)}
        .header .left .auth-btn{background:transparent;border:1px solid var(--border-color);color:var(--text-secondary);padding:4px 14px;border-radius:8px;font-size:0.6rem;font-weight:600;cursor:pointer;transition:all 0.3s ease;text-decoration:none;display:inline-flex;align-items:center;gap:6px;height:36px;width:fit-content}
        .header .left .auth-btn:active{transform:scale(0.85)}
        .header .left .auth-btn:hover{border-color:var(--gold);color:var(--gold)}
        .header .left .auth-btn.logged-in{background:linear-gradient(135deg,var(--gold),var(--orange));color:#0a0e1a;border-color:var(--gold);box-shadow:0 0 25px var(--gold-glow);padding:4px 14px}
        .header .left .auth-btn.logged-in:active{transform:scale(0.85)}
        .header .left .auth-btn.logged-in img{width:22px;height:22px;border-radius:50%;object-fit:cover;margin-right:4px}
        
        .header .right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
        .header .right .top{display:flex;gap:8px;align-items:center}
        .header .right .top .lang-switcher{display:flex;gap:2px;background:var(--bg-card);padding:3px;border-radius:8px;border:1px solid var(--border-color)}
        .header .right .top .lang-switcher .lang-btn{background:transparent;border:none;color:var(--text-secondary);padding:3px 10px;border-radius:6px;font-size:0.5rem;font-weight:700;cursor:pointer;transition:all 0.2s ease;text-transform:uppercase}
        .header .right .top .lang-switcher .lang-btn.active{background:var(--gold);color:#0a0e1a;box-shadow:0 0 20px var(--gold-glow)}
        .header .right .top .lang-switcher .lang-btn:active{transform:scale(0.85)}
        
        .header .right .top .noti-btn{background:var(--bg-card);border:1px solid var(--border-color);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s ease;font-size:1rem;color:var(--text-secondary);position:relative;text-decoration:none}
        .header .right .top .noti-btn:active{transform:scale(0.85)}
        .header .right .top .noti-btn .badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:0.4rem;font-weight:700;padding:1px 6px;border-radius:50%;display:none}

        .page-header{margin-bottom:20px;animation:slideUp 0.6s ease}
        .page-header h1{font-size:1.3rem;font-weight:800;color:var(--text-primary)}
        .page-header h1 span{background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 40px var(--gold-glow)}
        .page-header h1 i{color:var(--cyan);-webkit-text-fill-color:initial;margin-right:6px}
        .page-header p{color:var(--text-secondary);font-size:0.75rem;margin-top:2px}

        .noti-item{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:14px 16px;margin-bottom:10px;animation:slideUp 0.5s ease;display:flex;gap:14px;align-items:flex-start;transition:all 0.3s ease;box-shadow:0 2px 15px var(--shadow)}
        .noti-item:active{transform:scale(0.97)}
        .noti-item .icon{font-size:1.5rem;flex-shrink:0;margin-top:2px}
        .noti-item .icon.order{color:var(--gold)}
        .noti-item .icon.success{color:var(--green)}
        .noti-item .icon.warning{color:var(--warning)}
        .noti-item .icon.info{color:var(--cyan)}
        .noti-item .content{flex:1}
        .noti-item .content .title{font-size:0.85rem;font-weight:600;color:var(--text-primary)}
        .noti-item .content .desc{font-size:0.7rem;color:var(--text-secondary);margin-top:2px;line-height:1.4}
        .noti-item .content .time{font-size:0.5rem;color:var(--text-secondary);margin-top:4px;opacity:0.5}
        .noti-item .status-badge{font-size:0.45rem;font-weight:700;padding:2px 10px;border-radius:16px;text-transform:uppercase;display:inline-block;margin-top:4px}
        .noti-item .status-badge.pending{background:rgba(245,158,11,0.12);color:#f59e0b}
        .noti-item .status-badge.completed{background:rgba(34,211,238,0.12);color:#22d3ee}
        .noti-item .status-badge.cancelled{background:rgba(239,68,68,0.12);color:#ef4444}
        .noti-item .status-badge.info{background:rgba(0,212,255,0.12);color:#00d4ff}

        .empty-state{text-align:center;padding:50px 20px;color:var(--text-secondary);animation:slideUp 0.6s ease}
        .empty-state .icon{font-size:4rem;display:block;margin-bottom:16px;opacity:0.2}
        .empty-state h3{font-size:1.1rem;color:var(--text-primary);margin-bottom:4px}
        .empty-state p{font-size:0.75rem;opacity:0.7}

        .mark-all{text-align:right;margin-bottom:12px;animation:slideUp 0.5s ease}
        .mark-all button{background:transparent;border:none;color:var(--cyan);font-size:0.6rem;font-weight:600;cursor:pointer;transition:all 0.3s ease;padding:4px 12px;border-radius:8px;border:1px solid rgba(0,212,255,0.1)}
        .mark-all button:active{transform:scale(0.90);background:rgba(0,212,255,0.05)}

        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg-secondary);border-top:1px solid var(--border-color);display:flex;justify-content:space-around;padding:6px 0 10px;max-width:500px;margin:0 auto;z-index:100;border-radius:16px 16px 0 0;box-shadow:0 -8px 40px var(--shadow)}
        .bottom-nav .nav-item{text-align:center;cursor:pointer;text-decoration:none;color:var(--text-secondary);transition:all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);padding:4px 8px;border-radius:10px;position:relative}
        .bottom-nav .nav-item:active{transform:scale(0.75)}
        .bottom-nav .nav-item .icon{font-size:1.2rem;display:block;transition:all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)}
        .bottom-nav .nav-item .label{font-size:0.4rem;margin-top:1px;font-weight:700;letter-spacing:0.5px;transition:all 0.4s ease}
        .bottom-nav .nav-item.active{color:var(--gold)}
        .bottom-nav .nav-item.active .icon{transform:translateY(-6px) scale(1.15);text-shadow:0 0 30px var(--gold-glow)}
        .bottom-nav .nav-item.active .label{color:var(--gold)}
        .bottom-nav .nav-item.active::before{content:'';position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:24px;height:2.5px;background:linear-gradient(90deg,var(--gold),var(--orange));border-radius:10px;box-shadow:0 0 20px var(--gold-glow)}

        .footer-text{text-align:center;color:var(--text-secondary);font-size:0.45rem;margin-top:10px;opacity:0.3;letter-spacing:1px}

        .toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);background:var(--bg-card);padding:10px 20px;border-radius:12px;border:1px solid rgba(245,200,66,0.15);color:var(--gold);font-weight:600;font-size:0.75rem;display:none;z-index:200;text-align:center;max-width:90%;box-shadow:0 8px 40px var(--shadow);animation:toastPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)}
        .toast.show{display:block}
        @keyframes toastPop{from{opacity:0;transform:translateX(-50%) translateY(30px) scale(0.85)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        @keyframes shimmer{0%,100%{transform:translate(0,0)}50%{transform:translate(-20%,-20%)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="left">
            <div class="logo" id="appName"><i class="fas fa-gamepad"></i> Premium Game Shop</div>
            <div class="auth-btn" id="authBtn" onclick="handleAuthClick()">🔑 Login</div>
        </div>
        <div class="right">
            <div class="top">
                <div class="lang-switcher">
                    <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
                    <button class="lang-btn" data-lang="my" onclick="setLang('my')">MY</button>
                </div>
                <a href="notifications.html" class="noti-btn" id="notiBtn">
                    🔔
                    <span class="badge" id="notiBadge">0</span>
                </a>
            </div>
        </div>
    </div>

    <div class="page-header">
        <h1><i class="fas fa-bell"></i> <span id="pageTitle">Notifications</span></h1>
        <p id="pageSub">Stay updated with your orders</p>
    </div>

    <div class="mark-all">
        <button onclick="markAllRead()" id="markAllBtn">✅ Mark all as read</button>
    </div>

    <div id="notiContainer"></div>

    <div class="footer-text">&copy; 2026 Premium Game Shop</div>
</div>

<div class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="icon">🏠</span><span class="label" id="navHome">Home</span></a>
    <a href="shop.html" class="nav-item"><span class="icon">🛒</span><span class="label" id="navShop">Shop</span></a>
    <a href="payment.html" class="nav-item"><span class="icon">💳</span><span class="label" id="navPayment">Payment</span></a>
    <a href="profile.html" class="nav-item"><span class="icon">👤</span><span class="label" id="navProfile">Profile</span></a>
</div>

<div class="toast" id="toast"></div>

<script>
    function updateLanguage() {
        const d = LANG_DATA[currentLang];
        if (!d) return;
        document.getElementById('appName').innerHTML = '<i class="fas fa-gamepad"></i> ' + d.appName;
        document.getElementById('pageTitle').textContent = d.pageTitle || 'Notifications';
        document.getElementById('pageSub').textContent = d.pageSub || 'Stay updated with your orders';
        document.getElementById('markAllBtn').textContent = d.markAll || 'Mark all as read';
        document.getElementById('navHome').textContent = d.home || 'Home';
        document.getElementById('navShop').textContent = d.shop || 'Shop';
        document.getElementById('navPayment').textContent = d.payment || 'Payment';
        document.getElementById('navProfile').textContent = d.profile || 'Profile';
        updateAuthUI();
        renderNotifications();
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    function checkNotifications() {
        const notiData = JSON.parse(localStorage.getItem('newOrderNotification') || '{"show":false}');
        const badge = document.getElementById('notiBadge');
        if (notiData.show) {
            badge.style.display = 'block';
            badge.textContent = '1';
            setTimeout(() => {
                badge.style.display = 'none';
                localStorage.setItem('newOrderNotification', JSON.stringify({show: false}));
            }, 5000);
        } else {
            badge.style.display = 'none';
        }
    }

    window.addEventListener('storage', function(e) {
        if (e.key === 'newOrderNotification') {
            checkNotifications();
        }
    });

    function renderNotifications() {
        const container = document.getElementById('notiContainer');
        const d = LANG_DATA[currentLang] || {};
        
        let notifications = JSON.parse(localStorage.getItem('notifications') || '[]');
        
        // Add welcome notification if user is logged in and no notifications
        if (notifications.length === 0 && isLoggedIn()) {
            const user = getCurrentUser();
            notifications.push({
                id: 'noti-1',
                userId: user.username,
                type: 'welcome',
                title: d.notiWelcome || '👋 Welcome to Premium Game Shop!',
                description: d.notiWelcomeDesc || 'Start shopping and get the best deals.',
                time: new Date().toISOString(),
                read: false
            });
            localStorage.setItem('notifications', JSON.stringify(notifications));
        }

        const user = getCurrentUser();
        let userNotis = [];
        if (user) {
            userNotis = notifications.filter(n => n.userId === user.username);
        }

        if (userNotis.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <span class="icon">🔔</span>
                    <h3>${d.noNoti || 'No notifications yet'}</h3>
                    <p>${d.noNotiDesc || 'Your notifications will appear here'}</p>
                </div>
            `;
            return;
        }

        userNotis.sort((a, b) => new Date(b.time) - new Date(a.time));

        const getIcon = (type) => {
            switch(type) {
                case 'order': return '🛒';
                case 'completed': return '✅';
                case 'status': return '📦';
                case 'welcome': return '👋';
                default: return '🔔';
            }
        };

        const getIconClass = (type) => {
            switch(type) {
                case 'order': return 'order';
                case 'completed': return 'success';
                case 'status': return 'info';
                case 'welcome': return 'info';
                default: return 'info';
            }
        };

        const getBadgeClass = (type) => {
            switch(type) {
                case 'order': return 'pending';
                case 'completed': return 'completed';
                case 'status': return 'info';
                default: return 'info';
            }
        };

        container.innerHTML = userNotis.map(noti => `
            <div class="noti-item" onclick="markAsRead('${noti.id}')" style="${noti.read ? 'opacity:0.6;' : ''}">
                <span class="icon ${getIconClass(noti.type)}">${getIcon(noti.type)}</span>
                <div class="content">
                    <div class="title">${noti.title}</div>
                    <div class="desc">${noti.description}</div>
                    ${noti.orderId ? `<span class="status-badge ${getBadgeClass(noti.type)}">${noti.status || 'Pending'}</span>` : ''}
                    <div class="time">${new Date(noti.time).toLocaleString()}</div>
                </div>
            </div>
        `).join('');
    }

    function markAsRead(id) {
        let notifications = JSON.parse(localStorage.getItem('notifications') || '[]');
        notifications = notifications.map(n => {
            if (n.id === id) {
                n.read = true;
            }
            return n;
        });
        localStorage.setItem('notifications', JSON.stringify(notifications));
        renderNotifications();
    }

    function markAllRead() {
        let notifications = JSON.parse(localStorage.getItem('notifications') || '[]');
        const user = getCurrentUser();
        if (user) {
            notifications = notifications.map(n => {
                if (n.userId === user.username) {
                    n.read = true;
                }
                return n;
            });
            localStorage.setItem('notifications', JSON.stringify(notifications));
            renderNotifications();
            showToast(getText('markedAll') || '✅ All notifications marked as read');
        }
    }

    function updateAuthUI() {
        const authBtn = document.getElementById('authBtn');
        if (isLoggedIn()) {
            const user = getCurrentUser();
            const savedAvatar = localStorage.getItem('userAvatar_' + user.username);
            if (savedAvatar) {
                authBtn.innerHTML = '<img src="' + savedAvatar + '" alt="avatar"> ' + user.username;
            } else {
                authBtn.innerHTML = '👤 ' + user.username;
            }
            authBtn.className = 'auth-btn logged-in';
            authBtn.title = 'Go to Profile';
        } else {
            authBtn.innerHTML = '🔑 ' + (getText('login') || 'Login');
            authBtn.className = 'auth-btn';
            authBtn.title = 'Login';
        }
        renderNotifications();
    }

    function handleAuthClick() {
        if (isLoggedIn()) {
            window.location.href = 'profile.html';
        } else {
            openModal('login');
        }
    }

    // ===== AUTH MODAL =====
    let isLoginMode = true;

    function openModal(mode) {
        isLoginMode = mode !== 'register';
        const modal = document.getElementById('authModal');
        if (modal) {
            modal.classList.add('show');
            updateModalUI();
        } else {
            // Fallback: redirect to index if modal not found
            window.location.href = 'index.html';
        }
    }

    function closeModal() {
        const modal = document.getElementById('authModal');
        if (modal) modal.classList.remove('show');
    }

    function switchAuthMode() {
        isLoginMode = !isLoginMode;
        updateModalUI();
    }

    function updateModalUI() {
        const d = LANG_DATA[currentLang] || {};
        if (isLoginMode) {
            document.getElementById('modalTitle').textContent = d.modalLogin || '⚔️ Login';
            document.getElementById('modalSub').textContent = d.modalLoginSub || 'Welcome back, warrior!';
            document.getElementById('loginBtn').innerHTML = '⚡ ' + (d.login || 'Login');
            document.getElementById('emailLabel').textContent = d.email || '📧 Email / Username / Phone';
            document.getElementById('passLabel').textContent = d.password || '🔑 Password';
            document.getElementById('switchToRegister').textContent = d.switchLogin || "Don't have an account? Register";
        } else {
            document.getElementById('modalTitle').textContent = d.modalRegister || '🛡️ Register';
            document.getElementById('modalSub').textContent = d.modalRegisterSub || 'Create your account, champion!';
            document.getElementById('switchToLogin').textContent = d.switchRegister || 'Already have an account? Login';
        }
    }

    function handleLogin() {
        const input = document.getElementById('loginEmail')?.value.trim();
        const password = document.getElementById('loginPassword')?.value.trim();
        const d = LANG_DATA[currentLang] || {};

        if (!input) { showToast(d.enterEmail || 'Please enter your email or username'); return; }
        if (!password) { showToast(d.enterPassword || 'Please enter your password'); return; }

        if (loginUser(input, password)) {
            closeModal();
            showToast(d.loginSuccess || '✅ Welcome back, Champion!');
            updateAuthUI();
        } else {
            showToast('❌ Invalid email/username or password');
        }
    }

    function handleRegister() {
        const username = document.getElementById('regUsername')?.value.trim();
        const email = document.getElementById('regEmail')?.value.trim();
        const password = document.getElementById('regPassword')?.value.trim();
        const confirmPassword = document.getElementById('regConfirmPassword')?.value.trim();
        const d = LANG_DATA[currentLang] || {};

        if (!username) { showToast(d.enterUsername || 'Please enter your username'); return; }
        if (!email || !email.includes('@')) { showToast(d.enterValidEmail || 'Please enter a valid email'); return; }
        if (!password || password.length < 4) { showToast(d.passwordMin || 'Password must be at least 4 characters'); return; }
        if (password !== confirmPassword) { showToast(d.passwordMatch || 'Passwords do not match'); return; }

        if (registerUser(username, password)) {
            closeModal();
            showToast(d.registerSuccess || '✅ Account created! Welcome!');
            updateAuthUI();
        } else {
            showToast(d.userExists || '❌ Username already exists');
        }
    }

    // Add auth modal if not exists
    if (!document.getElementById('authModal')) {
        const modalHTML = `
        <div class="modal-overlay" id="authModal">
            <div class="modal">
                <button class="close-btn" onclick="closeModal()">✕</button>
                <h2 id="modalTitle">⚔️ Login</h2>
                <p id="modalSub">Welcome back, warrior!</p>
                <div id="modalBody">
                    <div id="loginForm">
                        <div class="form-group">
                            <label id="emailLabel">📧 Email / Username / Phone</label>
                            <input type="text" id="loginEmail" placeholder="Enter your email or username">
                        </div>
                        <div class="form-group">
                            <label id="passLabel">🔑 Password</label>
                            <input type="password" id="loginPassword" placeholder="Enter your password">
                        </div>
                        <button class="btn-primary" id="loginBtn" onclick="handleLogin()">⚡ Login</button>
                        <span class="switch-link" id="switchToRegister" onclick="switchAuthMode()">Don't have an account? Register</span>
                    </div>
                    <div id="registerForm" style="display:none;">
                        <div class="form-group">
                            <label>👤 Username <span class="required">*</span></label>
                            <input type="text" id="regUsername" placeholder="Choose a username">
                        </div>
                        <div class="form-group">
                            <label>📧 Email <span class="required">*</span></label>
                            <input type="email" id="regEmail" placeholder="Enter your email">
                        </div>
                        <div class="form-group">
                            <label>🔑 Password <span class="required">*</span></label>
                            <input type="password" id="regPassword" placeholder="Min 4 characters">
                        </div>
                        <div class="form-group">
                            <label>🔐 Confirm Password <span class="required">*</span></label>
                            <input type="password" id="regConfirmPassword" placeholder="Re-enter password">
                        </div>
                        <button class="btn-primary" onclick="handleRegister()">🛡️ Register</button>
                        <span class="switch-link" id="switchToLogin" onclick="switchAuthMode()">Already have an account? Login</span>
                    </div>
                </div>
            </div>
        </div>
        <style>
            .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(12px);display:none;z-index:300;align-items:center;justify-content:center;padding:20px}
            .modal-overlay.show{display:flex;animation:fadeIn 0.3s ease}
            .modal{background:linear-gradient(145deg,var(--bg-card),var(--bg-secondary));border:1px solid var(--border-color);border-radius:18px;padding:24px 20px;max-width:380px;width:100%;box-shadow:0 20px 60px var(--shadow);position:relative;overflow:hidden;max-height:90vh;overflow-y:auto}
            .modal::before{content:'';position:absolute;top:-50%;right:-50%;width:100%;height:100%;background:radial-gradient(circle,rgba(245,200,66,0.04) 0%,transparent 70%);animation:shimmer 8s ease-in-out infinite}
            .modal h2{font-size:1.2rem;color:var(--gold);margin-bottom:4px;text-align:center;position:relative;z-index:1;text-shadow:0 0 30px var(--gold-glow)}
            .modal p{color:var(--text-secondary);font-size:0.75rem;text-align:center;margin-bottom:16px;position:relative;z-index:1}
            .modal .form-group{margin-bottom:12px;position:relative;z-index:1}
            .modal .form-group label{font-size:0.6rem;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px}
            .modal .form-group input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border-color);background:var(--bg-input);color:var(--text-primary);font-size:0.85rem;outline:none;transition:all 0.3s ease}
            .modal .form-group input:focus{border-color:var(--gold);box-shadow:0 0 30px var(--gold-glow)}
            .modal .form-group input::placeholder{color:var(--text-secondary);font-size:0.7rem}
            .modal .btn-primary{width:100%;padding:11px;background:linear-gradient(135deg,var(--gold),var(--orange));color:#0a0e1a;border:none;border-radius:10px;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.3s ease;position:relative;z-index:1}
            .modal .btn-primary:active{transform:scale(0.96)}
            .modal .btn-primary:hover{box-shadow:0 0 40px var(--gold-glow)}
            .modal .switch-link{color:var(--cyan);cursor:pointer;font-weight:600;text-align:center;display:block;margin-top:10px;font-size:0.7rem;position:relative;z-index:1}
            .modal .switch-link:active{opacity:0.7}
            .modal .close-btn{position:absolute;top:10px;right:14px;background:none;border:none;color:var(--text-secondary);font-size:1.1rem;cursor:pointer;z-index:2}
        </style>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHTML);
    }

    document.getElementById('authModal')?.addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const modal = document.getElementById('authModal');
            if (modal && modal.classList.contains('show')) {
                if (isLoginMode) handleLogin();
                else handleRegister();
            }
        }
        if (e.key === 'Escape') closeModal();
    });

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', function() {
        const savedLang = localStorage.getItem('lang') || 'en';
        setLang(savedLang);
        updateAuthUI();
        checkNotifications();
    });
</script>
</body>
</html>
