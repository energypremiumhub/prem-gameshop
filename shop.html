<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ Premium Game Shop - Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
        
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111927;
            --bg-card: #141c2b;
            --bg-input: #1a2438;
            --text-primary: #ffffff;
            --text-secondary: #8899bb;
            --border-color: rgba(255,255,255,0.06);
            --shadow: rgba(0,0,0,0.5);
            --gold: #f5c842;
            --gold-glow: rgba(245,200,66,0.3);
            --cyan: #00d4ff;
            --cyan-glow: rgba(0,212,255,0.2);
            --pink: #ff6b9d;
            --orange: #f97316;
            --orange-glow: rgba(249,115,22,0.2);
            --green: #22d3ee;
            --green-glow: rgba(34,211,238,0.2);
            --red: #ef4444;
            --purple: #8b5cf6;
            --purple-glow: rgba(139,92,246,0.2);
            --warning: #f59e0b;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 90px;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(245,200,66,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(0,212,255,0.04) 0%, transparent 50%);
        }

        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:var(--bg-primary)}
        ::-webkit-scrollbar-thumb{background:var(--gold);border-radius:10px}

        .container{max-width:500px;margin:0 auto}

        /* ===== HEADER ===== */
        .header{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0 14px;flex-wrap:wrap;gap:6px}
        .header .left{display:flex;flex-direction:column;gap:6px}
        .header .left .logo{font-size:1rem;font-weight:800;color:var(--gold);text-shadow:0 0 20px var(--gold-glow);letter-spacing:0.5px}
        .header .left .logo i{color:var(--cyan);margin-right:6px;text-shadow:0 0 20px var(--cyan-glow)}
        /* Profile Icon Only - No Login Button */
        .header .left .profile-icon{background:transparent;border:1px solid var(--border-color);color:var(--text-secondary);padding:4px 14px;border-radius:8px;font-size:0.6rem;font-weight:600;cursor:pointer;transition:all 0.3s ease;text-decoration:none;display:inline-flex;align-items:center;gap:6px;height:36px;width:fit-content}
        .header .left .profile-icon:active{transform:scale(0.85)}
        .header .left .profile-icon:hover{border-color:var(--gold);color:var(--gold)}
        .header .left .profile-icon.logged-in{background:linear-gradient(135deg,var(--gold),var(--orange));color:#0a0e1a;border-color:var(--gold);box-shadow:0 0 25px var(--gold-glow);padding:4px 14px}
        .header .left .profile-icon.logged-in:active{transform:scale(0.85)}
        .header .left .profile-icon.logged-in img{width:22px;height:22px;border-radius:50%;object-fit:cover;margin-right:4px}
        
        .header .right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
        .header .right .top{display:flex;gap:8px;align-items:center}
        .header .right .top .lang-switcher{display:flex;gap:2px;background:var(--bg-card);padding:3px;border-radius:8px;border:1px solid var(--border-color)}
        .header .right .top .lang-switcher .lang-btn{background:transparent;border:none;color:var(--text-secondary);padding:3px 10px;border-radius:6px;font-size:0.5rem;font-weight:700;cursor:pointer;transition:all 0.2s ease;text-transform:uppercase}
        .header .right .top .lang-switcher .lang-btn.active{background:var(--gold);color:#0a0e1a;box-shadow:0 0 20px var(--gold-glow)}
        .header .right .top .lang-switcher .lang-btn:active{transform:scale(0.85)}
        
        .header .right .top .noti-btn{background:var(--bg-card);border:1px solid var(--border-color);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s ease;font-size:1rem;color:var(--text-secondary);position:relative;text-decoration:none}
        .header .right .top .noti-btn:active{transform:scale(0.85)}
        .header .right .top .noti-btn .badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:0.4rem;font-weight:700;padding:1px 6px;border-radius:50%;display:none}

        /* ===== PAGE HEADER ===== */
        .page-header{margin-bottom:16px;animation:slideUp 0.6s ease}
        .page-header h1{font-size:1.3rem;font-weight:800;color:var(--text-primary)}
        .page-header h1 span{background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 40px var(--gold-glow)}
        .page-header h1 i{color:var(--cyan);-webkit-text-fill-color:initial;margin-right:6px}
        .page-header p{color:var(--text-secondary);font-size:0.7rem;margin-top:2px}

        /* ===== DOUBLE DIAMOND BOX (အောက်ဆုံးကို သွားမယ်) ===== */
        .double-box{background:linear-gradient(135deg,rgba(245,200,66,0.08),rgba(249,115,22,0.04));border:1px solid rgba(245,200,66,0.12);border-radius:14px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;cursor:pointer;transition:all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);animation:slideUp 0.7s ease;position:relative;overflow:hidden}
        .double-box:active{transform:scale(0.96)}
        .double-box:hover{border-color:rgba(245,200,66,0.3);box-shadow:0 0 40px var(--gold-glow)}
        .double-box .left{display:flex;align-items:center;gap:12px}
        .double-box .left .icon{font-size:1.8rem;color:var(--gold)}
        .double-box .left .text{font-size:0.8rem;font-weight:600;color:var(--text-primary)}
        .double-box .left .sub{font-size:0.55rem;color:var(--text-secondary);margin-top:2px}
        .double-box .arrow{color:var(--gold);font-size:1.2rem;transition:all 0.3s ease}
        .double-box:hover .arrow{transform:translateX(4px)}

        /* ===== SECTION TITLE ===== */
        .section-title{font-size:0.65rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
        .section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border-color),transparent)}
        .section-title i{color:var(--cyan);text-shadow:0 0 20px var(--cyan-glow)}

        /* ===== PACKAGE LIST ===== */
        .package-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
        
        .package-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);border:2px solid var(--border-color);border-radius:12px;padding:12px 14px;transition:all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);cursor:pointer;box-shadow:0 4px 20px var(--shadow);position:relative;overflow:hidden}
        
        /* ===== SELECTED STATE (အရမ်းမိုက်တဲ့ Glow + Pulse) ===== */
        .package-item.selected{border-color:var(--gold);background:rgba(245,200,66,0.04);box-shadow:0 0 50px var(--gold-glow), inset 0 0 40px rgba(245,200,66,0.03)}
        .package-item.selected::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(245,200,66,0.05),transparent,rgba(0,212,255,0.05),transparent);animation:spinGlow 6s linear infinite;pointer-events:none}
        .package-item.selected .price{color:var(--gold);text-shadow:0 0 30px var(--gold-glow)}
        .package-item.selected .glow-pulse{position:absolute;top:0;left:0;right:0;bottom:0;border-radius:12px;background:radial-gradient(circle at center,rgba(245,200,66,0.05) 0%,transparent 70%);animation:pulseGlow 1.5s ease-in-out infinite;pointer-events:none}
        
        @keyframes spinGlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        @keyframes pulseGlow{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}

        /* ===== Hover Effect (အိုင်ကွန်လှုပ် + အရောင်ပြောင်း) ===== */
        .package-item:hover .dia-icon{animation:floatIcon 2s ease-in-out infinite;color:var(--gold)}
        .package-item:hover .price{color:var(--gold)}
        .package-item:hover{border-color:rgba(245,200,66,0.15)}
        @keyframes floatIcon{0%,100%{transform:translateY(0px)}50%{transform:translateY(-3px)}}

        .package-item .info{display:flex;flex-direction:column;gap:2px;flex:1;position:relative;z-index:1}
        .package-item .info .name{font-size:0.75rem;font-weight:600;color:var(--text-primary)}
        .package-item .info .name .dia-icon{color:var(--text-secondary);margin-right:4px;transition:all 0.3s ease;display:inline-block}
        .package-item .info .badge{display:inline-block;font-size:0.4rem;color:var(--green);background:rgba(34,211,238,0.08);padding:1px 8px;border-radius:10px;border:1px solid rgba(34,211,238,0.1);width:fit-content;font-weight:600}
        .package-item .info .double-badge{background:rgba(245,158,11,0.12);color:var(--warning);border-color:rgba(245,158,11,0.1)}
        
        .package-item .right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:3px;position:relative;z-index:1}
        .package-item .right .price{font-size:0.85rem;font-weight:700;color:var(--text-secondary);transition:all 0.4s ease}
        
        .package-item .right .btn{background:linear-gradient(135deg,var(--gold),var(--orange));color:#0a0e1a;border:none;padding:4px 14px;border-radius:12px;font-weight:700;font-size:0.55rem;cursor:pointer;transition:all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);box-shadow:0 0 20px rgba(245,200,66,0.1)}
        .package-item .right .btn:active{transform:scale(0.85)}
        .package-item .right .btn:hover{box-shadow:0 0 40px var(--gold-glow)}
        .package-item .right .btn.select-mode{background:var(--bg-input);color:var(--text-secondary);box-shadow:none;border:1px solid var(--border-color)}
        .package-item .right .btn.select-mode:active{transform:scale(0.85)}
        .package-item .right .btn.select-mode:hover{border-color:var(--gold);color:var(--gold)}
        .package-item .right .btn.buy-mode{background:linear-gradient(135deg,var(--gold),var(--orange));color:#0a0e1a;box-shadow:0 0 30px var(--gold-glow);animation:btnPulse 1s ease-in-out infinite}
        @keyframes btnPulse{0%,100%{box-shadow:0 0 20px var(--gold-glow)}50%{box-shadow:0 0 50px var(--gold-glow)}}

        /* ===== FIXED BUY (ရိုးရိုး) ===== */
        .fixed-buy{position:fixed;bottom:65px;left:0;right:0;padding:10px 16px;background:var(--bg-secondary);border-top:1px solid var(--border-color);border-bottom:1px solid var(--border-color);z-index:50;display:flex;justify-content:space-between;align-items:center;max-width:500px;margin:0 auto}
        .fixed-buy .info{display:flex;flex-direction:column;gap:2px}
        .fixed-buy .info .label{font-size:0.5rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px}
        .fixed-buy .info .name{font-size:0.75rem;font-weight:600;color:var(--text-primary)}
        .fixed-buy .info .price{font-size:0.85rem;font-weight:700;color:var(--gold)}
        .fixed-buy .btn-buy-now{background:linear-gradient(135deg,var(--gold),var(--orange));color:#0a0e1a;border:none;padding:10px 24px;border-radius:12px;font-weight:700;font-size:0.75rem;cursor:pointer;transition:all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);box-shadow:0 0 30px var(--gold-glow)}
        .fixed-buy .btn-buy-now:active{transform:scale(0.92)}
        .fixed-buy .btn-buy-now:disabled{opacity:0.3;cursor:not-allowed;box-shadow:none}
        .fixed-buy .btn-buy-now i{margin-right:4px}

        /* ===== BOTTOM NAV (လေးထောင့်ကွက်) ===== */
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg-secondary);border-top:1px solid var(--border-color);display:flex;justify-content:space-around;padding:10px 0 14px;max-width:500px;margin:0 auto;z-index:100;border-radius:16px 16px 0 0;box-shadow:0 -8px 40px var(--shadow)}
        .bottom-nav .nav-item{text-align:center;cursor:pointer;text-decoration:none;color:var(--text-secondary);transition:all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);padding:4px 12px;border-radius:10px;position:relative}
        .bottom-nav .nav-item:active{transform:scale(0.80)}
        .bottom-nav .nav-item .icon{font-size:1.3rem;display:block;transition:all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)}
        .bottom-nav .nav-item .label{font-size:0.45rem;margin-top:2px;font-weight:600;letter-spacing:0.5px;transition:all 0.4s ease}
        .bottom-nav .nav-item.active{color:var(--gold);background:rgba(245,200,66,0.06)}
        .bottom-nav .nav-item.active .icon{transform:translateY(-2px)}
        .bottom-nav .nav-item.active .label{color:var(--gold)}
        .bottom-nav .nav-item:hover .icon{transform:translateY(-2px)}

        .footer{text-align:center;margin-top:10px;padding:10px;border-top:1px solid var(--border-color);color:var(--text-secondary);font-size:0.45rem;opacity:0.3;letter-spacing:1px}

        /* ===== TOAST ===== */
        .toast{position:fixed;bottom:140px;left:50%;transform:translateX(-50%);background:var(--bg-card);padding:10px 20px;border-radius:12px;border:1px solid rgba(245,200,66,0.15);color:var(--gold);font-weight:600;font-size:0.75rem;display:none;z-index:200;text-align:center;max-width:90%;box-shadow:0 8px 40px var(--shadow);animation:toastPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)}
        .toast.show{display:block}
        @keyframes toastPop{from{opacity:0;transform:translateX(-50%) translateY(30px) scale(0.85)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        @keyframes shimmer{0%,100%{transform:translate(0,0)}50%{transform:translate(-20%,-20%)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}

        /* ===== MODAL ===== */
        .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(12px);display:none;z-index:300;align-items:center;justify-content:center;padding:20px}
        .modal-overlay.show{display:flex;animation:fadeIn 0.3s ease}
        .modal{background:linear-gradient(145deg,var(--bg-card),var(--bg-secondary));border:1px solid var(--border-color);border-radius:18px;padding:24px 20px;max-width:380px;width:100%;box-shadow:0 20px 60px var(--shadow);position:relative;overflow:hidden;max-height:90vh;overflow-y:auto}
        .modal::before{content:'';position:absolute;top:-50%;right:-50%;width:100%;height:100%;background:radial-gradient(circle,rgba(245,200,66,0.04) 0%,transparent 70%);animation:shimmer 8s ease-in-out infinite}
        .modal h2{font-size:1.2rem;color:var(--gold);margin-bottom:4px;text-align:center;position:relative;z-index:1;text-shadow:0 0 30px var(--gold-glow)}
        .modal p{color:var(--text-secondary);font-size:0.75rem;text-align:center;margin-bottom:16px;position:relative;z-index:1}
        .modal .form-group{margin-bottom:12px;position:relative;z-index:1}
        .modal .form-group label{font-size:0.6rem;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px}
        .modal .form-group input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border-color);background:var(--bg-input);color:var(--text-primary);font-size:0.85rem;outline:none;transition:all 0.3s ease}
        .modal .form-group input:focus{border-color:var(--gold);box-shadow:0 0 30px var(--gold-glow)}
        .modal .form-group input::placeholder{color:var(--text-secondary);font-size:0.7rem}
        .modal .btn-primary{width:100%;padding:11px;background:linear-gradient(135deg,var(--gold),var(--orange));color:#0a0e1a;border:none;border-radius:10px;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.3s ease;position:relative;z-index:1}
        .modal .btn-primary:active{transform:scale(0.96)}
        .modal .btn-primary:hover{box-shadow:0 0 40px var(--gold-glow)}
        .modal .switch-link{color:var(--cyan);cursor:pointer;font-weight:600;text-align:center;display:block;margin-top:10px;font-size:0.7rem;position:relative;z-index:1}
        .modal .close-btn{position:absolute;top:10px;right:14px;background:none;border:none;color:var(--text-secondary);font-size:1.1rem;cursor:pointer;z-index:2}
        .avatar-upload .preview{width:70px;height:70px;border-radius:50%;background:var(--bg-input);border:2px solid var(--border-color);display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--text-secondary);cursor:pointer;transition:all 0.3s ease;overflow:hidden;position:relative;margin:0 auto 8px}
        .avatar-upload .preview:hover{border-color:var(--gold);box-shadow:0 0 30px var(--gold-glow)}
        .avatar-upload .preview img{width:100%;height:100%;object-fit:cover}
        .avatar-upload .preview input{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}
        .avatar-upload .preview .upload-hint{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.7);padding:2px;font-size:0.4rem;color:var(--text-secondary);text-align:center;display:none}
        .avatar-upload .preview:hover .upload-hint{display:block}
        .avatar-upload .label{font-size:0.55rem;color:var(--text-secondary);text-align:center;display:block}
    </style>
</head>
<body>
<div class="container">
    <!-- ===== HEADER ===== -->
    <div class="header">
        <div class="left">
            <div class="logo" id="appName"><i class="fas fa-gamepad"></i> Premium Game Shop</div>
            <!-- Profile Icon Only (No Login) -->
            <div class="profile-icon" id="profileIcon" onclick="goToProfile()">👤 Profile</div>
        </div>
        <div class="right">
            <div class="top">
                <div class="lang-switcher">
                    <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
                    <button class="lang-btn" data-lang="my" onclick="setLang('my')">MY</button>
                </div>
                <a href="notifications.html" class="noti-btn" id="notiBtn">
                    🔔
                    <span class="badge" id="notiBadge">0</span>
                </a>
            </div>
        </div>
    </div>

    <!-- ===== PAGE HEADER ===== -->
    <div class="page-header">
        <h1 id="shopTitle"><i class="fas fa-gem"></i> Diamonds <span>Package</span></h1>
        <p id="shopSub">Select a package, then tap Buy</p>
    </div>

    <!-- ===== DOUBLE DIAMOND BOX (အောက်ကို သွားမယ်) ===== -->
    <div class="double-box" onclick="scrollToDouble()">
        <div class="left">
            <span class="icon">⭐</span>
            <div>
                <div class="text" id="doubleBoxTitle">Double Diamonds</div>
                <div class="sub" id="doubleBoxSub">Tap to view double diamond packages</div>
            </div>
        </div>
        <span class="arrow"><i class="fas fa-chevron-down"></i></span>
    </div>

    <!-- ===== BUNDLES ===== -->
    <div class="section-title" id="bundlesTitle"><i class="fas fa-gift"></i> Bundles</div>
    <div class="package-list" id="bundlesList"></div>

    <!-- ===== DIAMONDS ===== -->
    <div class="section-title" id="diamondsTitle"><i class="fas fa-diamond"></i> Diamonds</div>
    <div class="package-list" id="diamondsList"></div>

    <!-- ===== DOUBLE TOP UP ===== -->
    <div class="section-title" id="doubleTitle"><i class="fas fa-star"></i> Double Top Up</div>
    <div class="package-list" id="doubleList"></div>

    <div class="footer">&copy; 2026 Premium Game Shop</div>
</div>

<!-- ===== FIXED BUY ===== -->
<div class="fixed-buy" id="fixedBuy">
    <div class="info">
        <span class="label" id="buyLabel">Selected Package</span>
        <span class="name" id="buyName">None</span>
        <span class="price" id="buyPrice">0 Ks</span>
    </div>
    <button class="btn-buy-now" id="buyNowBtn" disabled onclick="proceedToCheckout()">
        <i class="fas fa-shopping-cart"></i> <span id="buyNowText">Buy</span>
    </button>
</div>

<!-- ===== BOTTOM NAV ===== -->
<div class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="icon">🏠</span><span class="label" id="navHome">Home</span></a>
    <a href="shop.html" class="nav-item active"><span class="icon">🛒</span><span class="label" id="navShop">Shop</span></a>
    <a href="payment.html" class="nav-item"><span class="icon">💳</span><span class="label" id="navPayment">Payment</span></a>
    <a href="profile.html" class="nav-item"><span class="icon">👤</span><span class="label" id="navProfile">Profile</span></a>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script>
    // ===== LANGUAGE DATA =====
    const LANG_DATA = {
        en: {
            appName: 'Premium Game Shop',
            shopTitle: 'Diamonds Package',
            shopSub: 'Select a package, then tap Buy',
            bundlesTitle: 'Bundles',
            diamondsTitle: 'Diamonds',
            doubleTitle: 'Double Top Up',
            doubleBoxTitle: 'Double Diamonds',
            doubleBoxSub: 'Tap to view double diamond packages',
            buyLabel: 'Selected Package',
            buyNow: 'Buy',
            select: 'Select',
            buy: 'Buy',
            home: 'Home', shop: 'Shop', payment: 'Payment', profile: 'Profile',
            noti: '🔔 No new notifications',
            selectFirst: '⚠️ Please select a package first!',
            selected: 'Selected'
        },
        my: {
            appName: 'ပရီမီယံ ဂိမ်းဆိုင်',
            shopTitle: 'စိန်အထုပ်များ',
            shopSub: 'အထုပ်တစ်ခုရွေးပြီး Buy နှိပ်ပါ',
            bundlesTitle: 'အထုပ်များ',
            diamondsTitle: 'စိန်များ',
            doubleTitle: 'နှစ်ဆဖြည့်မှု',
            doubleBoxTitle: 'နှစ်ဆစိန်များ',
            doubleBoxSub: 'နှစ်ဆစိန်အထုပ်များကိုကြည့်ရန် နှိပ်ပါ',
            buyLabel: 'ရွေးထားသောအထုပ်',
            buyNow: 'ဝယ်မည်',
            select: 'ရွေးရန်',
            buy: 'ဝယ်ရန်',
            home: 'ပင်မ', shop: 'ဆိုင်', payment: 'ငွေပေးချေ', profile: 'ပရိုဖိုင်',
            noti: '🔔 အသိပေးချက်အသစ်မရှိပါ',
            selectFirst: '⚠️ ကျေးဇူးပြု၍ အထုပ်တစ်ခုကို ဦးစွာရွေးပါ!',
            selected: 'ရွေးပြီး'
        }
    };

    let currentLang = localStorage.getItem('lang') || 'en';

    function getText(key) { return LANG_DATA[currentLang][key] || key; }

    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('lang', lang);
        updateLanguage();
        document.querySelectorAll('.lang-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.lang === lang);
        });
    }

    function updateLanguage() {
        const d = LANG_DATA[currentLang];
        document.getElementById('appName').innerHTML = '<i class="fas fa-gamepad"></i> ' + d.appName;
        document.getElementById('shopTitle').innerHTML = '<i class="fas fa-gem"></i> ' + d.shopTitle;
        document.getElementById('shopSub').textContent = d.shopSub;
        document.getElementById('bundlesTitle').innerHTML = '<i class="fas fa-gift"></i> ' + d.bundlesTitle;
        document.getElementById('diamondsTitle').innerHTML = '<i class="fas fa-diamond"></i> ' + d.diamondsTitle;
        document.getElementById('doubleTitle').innerHTML = '<i class="fas fa-star"></i> ' + d.doubleTitle;
        document.getElementById('doubleBoxTitle').textContent = d.doubleBoxTitle;
        document.getElementById('doubleBoxSub').textContent = d.doubleBoxSub;
        document.getElementById('buyLabel').textContent = d.buyLabel;
        document.getElementById('buyNowText').textContent = d.buyNow;
        document.getElementById('navHome').textContent = d.home;
        document.getElementById('navShop').textContent = d.shop;
        document.getElementById('navPayment').textContent = d.payment;
        document.getElementById('navProfile').textContent = d.profile;
        updateAuthUI();
        renderPackages();
    }

    // ===== TOAST =====
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ===== NOTIFICATION =====
    function checkNotifications() {
        const notiData = JSON.parse(localStorage.getItem('newOrderNotification') || '{"show":false}');
        const badge = document.getElementById('notiBadge');
        if (notiData.show) {
            badge.style.display = 'block';
            badge.textContent = '1';
            setTimeout(() => {
                badge.style.display = 'none';
                localStorage.setItem('newOrderNotification', JSON.stringify({show: false}));
            }, 5000);
        } else {
            badge.style.display = 'none';
        }
    }

    function showNotification() {
        const notiData = JSON.parse(localStorage.getItem('newOrderNotification') || '{"show":false}');
        if (notiData.show) {
            showToast('🛒 ' + notiData.message + ' #' + notiData.orderId);
            localStorage.setItem('newOrderNotification', JSON.stringify({show: false}));
            document.getElementById('notiBadge').style.display = 'none';
        } else {
            showToast(getText('noti'));
        }
    }

    window.addEventListener('storage', function(e) {
        if (e.key === 'newOrderNotification') {
            checkNotifications();
        }
    });

    // ===== SCROLL TO DOUBLE =====
    function scrollToDouble() {
        document.getElementById('doubleList').scrollIntoView({ behavior: 'smooth', block: 'start' });
        setTimeout(() => {
            document.getElementById('doubleList').style.border = '2px solid var(--gold)';
            document.getElementById('doubleList').style.borderRadius = '12px';
            document.getElementById('doubleList').style.padding = '4px';
            setTimeout(() => {
                document.getElementById('doubleList').style.border = 'none';
                document.getElementById('doubleList').style.padding = '0';
            }, 2000);
        }, 500);
    }

    // ===== AUTH =====
    let currentUser = null;
    const savedUser = localStorage.getItem('currentUser');
    if (savedUser) currentUser = JSON.parse(savedUser);

    function isLoggedIn() { return currentUser !== null; }

    function updateAuthUI() {
        const profileIcon = document.getElementById('profileIcon');
        if (currentUser) {
            const savedAvatar = localStorage.getItem('userAvatar_' + currentUser.username);
            if (savedAvatar) {
                profileIcon.innerHTML = '<img src="' + savedAvatar + '" alt="avatar"> ' + currentUser.username;
            } else {
                profileIcon.innerHTML = '👤 ' + currentUser.username;
            }
            profileIcon.className = 'profile-icon logged-in';
        } else {
            profileIcon.innerHTML = '👤 Profile';
            profileIcon.className = 'profile-icon';
        }
        if (window.updateProfileUI) window.updateProfileUI();
    }

    function goToProfile() {
        window.location.href = 'profile.html';
    }

    // ===== PACKAGE DATA =====
    const PACKAGES = {
        bundles: [
            { id: 'b1', name: 'Monthly Epic Bundle', price: 17200, badge: '⚡ + ★180 Bonus' },
            { id: 'b2', name: 'Weekly Elite Bundle', price: 3350, badge: '⚡ + ★20 Bonus' },
            { id: 'b3', name: 'Weekly Pass', price: 6500, badge: '' }
        ],
        diamonds: [
            { id: 'd1', name: '11 Diamonds', price: 1000 },
            { id: 'd2', name: '22 Diamonds', price: 1750 },
            { id: 'd3', name: '33 Diamonds', price: 2500 },
            { id: 'd4', name: '44 Diamonds', price: 3300 },
            { id: 'd5', name: '56 Diamonds', price: 4000 },
            { id: 'd6', name: '86 Diamonds', price: 5500 },
            { id: 'd7', name: '112 Diamonds', price: 7800 },
            { id: 'd8', name: '172 Diamonds', price: 10700 },
            { id: 'd9', name: '257 Diamonds', price: 15900 },
            { id: 'd10', name: '343 Diamonds', price: 21100 },
            { id: 'd11', name: '429 Diamonds', price: 26600 },
            { id: 'd12', name: '514 Diamonds', price: 31200 },
            { id: 'd13', name: '600 Diamonds', price: 36700 },
            { id: 'd14', name: '706 Diamonds', price: 42800 },
            { id: 'd15', name: '878 Diamonds', price: 53100 },
            { id: 'd16', name: '963 Diamonds', price: 58500 },
            { id: 'd17', name: '1,049 Diamonds', price: 63800 },
            { id: 'd18', name: '1,135 Diamonds', price: 69300 },
            { id: 'd19', name: '1,412 Diamonds', price: 84900 },
            { id: 'd20', name: '2,195 Diamonds', price: 126000 },
            { id: 'd21', name: '2,901 Diamonds', price: 166300 },
            { id: 'd22', name: '3,688 Diamonds', price: 207500 },
            { id: 'd23', name: '5,532 Diamonds', price: 312000 },
            { id: 'd24', name: '9,288 Diamonds', price: 522000 }
        ],
        double: [
            { id: 'x1', name: '50 + 50 (Double)', price: 3800, badge: '⭐ 2x Bonus' },
            { id: 'x2', name: '150 + 150 (Double)', price: 10300, badge: '⭐ 2x Bonus' },
            { id: 'x3', name: '250 + 250 (Double)', price: 16000, badge: '⭐ 2x Bonus' },
            { id: 'x4', name: '500 + 500 (Double)', price: 32400, badge: '⭐ 2x Bonus' }
        ]
    };

    let selectedPackage = null;

    function formatPrice(price) {
        return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',') + ' Ks';
    }

    function renderPackages() {
        const selectText = getText('select');
        const buyText = getText('buy');
        
        const renderItems = (items, type) => {
            return items.map(pkg => {
                let badgeHtml = '';
                if (type === 'double' && pkg.badge) {
                    badgeHtml = `<span class="badge double-badge">${pkg.badge}</span>`;
                } else if (pkg.badge) {
                    badgeHtml = `<span class="badge">${pkg.badge}</span>`;
                }
                const isSelected = selectedPackage && selectedPackage.id === pkg.id;
                return `
                    <div class="package-item ${isSelected ? 'selected' : ''}" data-id="${pkg.id}" onclick="handlePackageClick('${pkg.id}', '${pkg.name}', ${pkg.price}, '${type}')">
                        <div class="glow-pulse"></div>
                        <div class="info">
                            <div class="name"><span class="dia-icon">💎</span> ${pkg.name}</div>
                            ${badgeHtml}
                        </div>
                        <div class="right">
                            <div class="price">${formatPrice(pkg.price)}</div>
                            <button class="btn ${isSelected ? 'buy-mode' : 'select-mode'}" onclick="event.stopPropagation(); handlePackageClick('${pkg.id}', '${pkg.name}', ${pkg.price}, '${type}')">
                                ${isSelected ? buyText : selectText}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        };

        document.getElementById('bundlesList').innerHTML = renderItems(PACKAGES.bundles, 'bundle');
        document.getElementById('diamondsList').innerHTML = renderItems(PACKAGES.diamonds, 'diamond');
        document.getElementById('doubleList').innerHTML = renderItems(PACKAGES.double, 'double');

        updateBuyUI();
    }

    function handlePackageClick(id, name, price, type) {
        // If already selected, go to checkout
        if (selectedPackage && selectedPackage.id === id) {
            proceedToCheckout();
            return;
        }
        
        // Select this package
        selectedPackage = { id, name, price, type };
        renderPackages();
        showToast(`✅ ${getText('selected')}: ${name}`);
    }

    function updateBuyUI() {
        const buyName = document.getElementById('buyName');
        const buyPrice = document.getElementById('buyPrice');
        const btn = document.getElementById('buyNowBtn');

        if (selectedPackage) {
            buyName.textContent = selectedPackage.name;
            buyPrice.textContent = formatPrice(selectedPackage.price);
            btn.disabled = false;
        } else {
            buyName.textContent = 'None';
            buyPrice.textContent = '0 Ks';
            btn.disabled = true;
        }
    }

    function proceedToCheckout() {
        if (!selectedPackage) {
            showToast(getText('selectFirst'));
            return;
        }
        window.location.href = 'checkout.html?package=' + encodeURIComponent(selectedPackage.name) + '&price=' + encodeURIComponent(formatPrice(selectedPackage.price));
    }

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', function() {
        const savedLang = localStorage.getItem('lang') || 'en';
        setLang(savedLang);
        renderPackages();
        updateAuthUI();
        checkNotifications();
    });
</script>
</body>
</html>
