<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎮 Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
        
        :root {
            --bg-primary: #e8eaf0;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255,255,255,0.35);
            --bg-input: rgba(255,255,255,0.7);
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --border-color: rgba(0,0,0,0.08);
            --shadow: rgba(0,0,0,0.06);
            --shadow-hover: rgba(0,0,0,0.1);
            --primary: #6c5ce7;
            --gold: #f5a623;
            --gold-glow: rgba(245,166,35,0.2);
            --cyan: #00b4d8;
            --cyan-glow: rgba(0,180,216,0.15);
            --orange: #ff6a00;
            --green: #00c853;
            --red: #ff0044;
        }

        .night-mode {
            --bg-primary: #0d0d1a;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(30,30,60,0.5);
            --bg-input: rgba(40,40,80,0.5);
            --text-primary: #e8eaf0;
            --text-secondary: #a8a8c8;
            --border-color: rgba(255,255,255,0.06);
            --shadow: rgba(0,0,0,0.3);
            --gold: #ffd700;
            --gold-glow: rgba(255,215,0,0.2);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 90px;
            transition: all 0.4s ease;
        }

        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--primary);border-radius:10px}

        .container{max-width:480px;margin:0 auto}

        .glass-box {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 4px 20px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .glass-box:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px var(--shadow-hover), inset 0 1px 0 rgba(255,255,255,0.15);
        }

        .click-pop { animation: pop 0.3s cubic-bezier(0.34,1.56,0.64,1); }
        @keyframes pop {
            0% { transform: scale(1); }
            30% { transform: scale(0.92); }
            60% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .btn-click {
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .btn-click:active {
            transform: scale(0.92) !important;
            opacity: 0.7 !important;
        }

        .card-click {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
            cursor: pointer;
        }
        .card-click:active {
            transform: scale(0.96) translateY(2px) !important;
        }

        .nav-click {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
            cursor: pointer;
        }
        .nav-click:active {
            transform: scale(0.88) !important;
        }

        .ripple {
            position: relative;
            overflow: hidden;
        }
        .ripple::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }
        .ripple:active::after {
            width: 300px;
            height: 300px;
            opacity: 0;
        }

        .header{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0 14px;flex-wrap:wrap;gap:6px}
        .header .left{display:flex;flex-direction:column;gap:8px}
        .header .left .logo-wrap{display:flex;align-items:center;gap:10px}
        .header .left .logo-wrap img{height:38px;width:auto;border-radius:10px}
        .header .left .logo-wrap .text-group{display:flex;flex-direction:column;line-height:1.1}
        .header .left .logo-wrap .text-group .premium{font-size:1rem;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 20px var(--gold-glow)}
        .header .left .logo-wrap .text-group .shop{font-size:0.55rem;font-weight:600;color:var(--text-secondary);opacity:0.6;margin-top:-2px}
        .header .left .auth-btn{display:none}
        
        .header .right .top{display:flex;gap:6px;align-items:center}
        .header .right .top .lang-switcher{display:flex;gap:2px;background:var(--bg-card);padding:3px;border-radius:10px;border:1px solid var(--border-color);box-shadow:0 2px 10px var(--shadow)}
        .header .right .top .lang-switcher .lang-btn{background:transparent;border:none;color:var(--text-secondary);padding:3px 10px;border-radius:6px;font-size:0.5rem;font-weight:700;cursor:pointer;text-transform:uppercase}
        .header .right .top .lang-switcher .lang-btn.active{background:linear-gradient(135deg,var(--gold),var(--orange));color:#fff;box-shadow:0 4px 15px var(--gold-glow)}
        .header .right .top .night-toggle{background:var(--bg-card);border:1px solid var(--border-color);border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;color:var(--text-secondary);box-shadow:0 2px 10px var(--shadow);transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1)}
        .header .right .top .night-toggle:active{transform:scale(0.92)}
        .night-mode .header .right .top .night-toggle .fa-sun{color:#ffd700}
        .header .right .top .noti-btn{background:var(--bg-card);border:1px solid var(--border-color);border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;color:var(--text-secondary);position:relative;text-decoration:none;box-shadow:0 2px 10px var(--shadow)}
        .header .right .top .noti-btn:active{transform:scale(0.92)}
        .header .right .top .noti-btn .badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:0.4rem;font-weight:700;padding:1px 6px;border-radius:50%;display:none}

        .page-header{margin-bottom:16px;animation:slideUp 0.6s ease}
        .page-header h1{font-size:1.3rem;font-weight:800;color:var(--text-primary)}
        .page-header h1 span{background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .page-header h1 i{color:var(--cyan);-webkit-text-fill-color:initial;margin-right:6px}
        .page-header p{color:var(--text-secondary);font-size:0.7rem;margin-top:2px}

        .search-box{background:var(--bg-card);backdrop-filter:blur(20px);border:1px solid var(--border-color);border-radius:14px;padding:10px 16px;display:flex;align-items:center;gap:12px;margin-bottom:20px;transition:all 0.3s ease;box-shadow:0 4px 20px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.1)}
        .search-box:focus-within{border-color:var(--gold);box-shadow:0 0 40px var(--gold-glow)}
        .search-box .icon{color:var(--text-secondary);font-size:1rem}
        .search-box input{background:transparent;border:none;color:var(--text-primary);font-size:0.85rem;flex:1;outline:none;padding:4px 0}
        .search-box input::placeholder{color:var(--text-secondary);font-size:0.75rem}
        .search-box .clear-btn{color:var(--text-secondary);font-size:0.8rem;cursor:pointer;padding:4px;display:none;transition:all 0.2s ease}
        .search-box .clear-btn:active{transform:scale(0.85)}
        .search-box .clear-btn.show{display:block}

        /* ===== GAME GRID ===== */
        .game-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
        .game-item{background:var(--bg-card);backdrop-filter:blur(20px);border:1px solid var(--border-color);border-radius:14px;padding:12px 14px;cursor:pointer;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 4px 20px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.1);display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;min-height:72px}
        .game-item:active{transform:scale(0.94);transition:transform 0.15s ease}
        .game-item:hover{transform:translateY(-3px);border-color:rgba(245,166,35,0.3);box-shadow:0 8px 30px var(--shadow-hover), inset 0 1px 0 rgba(255,255,255,0.15)}
        
        /* ===== CLICK RIPPLE EFFECT ===== */
        .game-item .ripple-effect{position:absolute;border-radius:50%;background:rgba(245,166,35,0.3);transform:scale(0);animation:rippleAnim 0.6s linear;pointer-events:none}
        @keyframes rippleAnim{to{transform:scale(4);opacity:0}}
        
        .game-item .badge{position:absolute;top:6px;right:8px;background:var(--gold);color:#fff;font-size:0.4rem;font-weight:700;padding:2px 10px;border-radius:12px;box-shadow:0 0 20px var(--gold-glow);animation:glowPulse 2s ease-in-out infinite;z-index:2}
        .game-item .game-img{width:44px;height:44px;border-radius:12px;object-fit:cover;flex-shrink:0;border:2px solid var(--border-color);transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);position:relative;z-index:1}
        .game-item:hover .game-img{transform:scale(1.08) rotate(-4deg);border-color:var(--gold);box-shadow:0 0 20px var(--gold-glow)}
        .game-item .game-img-placeholder{font-size:1.8rem;flex-shrink:0;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;border:2px solid var(--border-color);background:var(--bg-input);transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);position:relative;z-index:1}
        .game-item:hover .game-img-placeholder{transform:scale(1.08) rotate(-4deg);border-color:var(--gold);box-shadow:0 0 20px var(--gold-glow)}
        .game-item .info{flex:1;min-width:0;position:relative;z-index:1}
        .game-item .info .name{font-size:0.8rem;font-weight:700;color:var(--text-primary)}
        .game-item .info .sub{font-size:0.5rem;color:var(--text-secondary);margin-top:1px}
        .game-item .glow{position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(245,166,35,0.05) 0%,transparent 70%);opacity:0;transition:all 0.6s ease;pointer-events:none}
        .game-item:hover .glow{opacity:1}
        .game-item.hidden{display:none}

        /* ===== CLICK ANIMATION (Bounce) ===== */
        .game-item.bounce-click{animation:bounceClick 0.4s cubic-bezier(0.34,1.56,0.64,1)}
        @keyframes bounceClick{0%{transform:scale(1)}30%{transform:scale(0.92)}60%{transform:scale(1.04)}100%{transform:scale(1)}}

        .section-title{font-size:0.65rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;gap:10px;opacity:0.5}
        .section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border-color),transparent)}
        .section-title i{color:var(--cyan);text-shadow:0 0 20px var(--cyan-glow)}

        .bottom-nav {
            position: fixed;
            bottom: 16px;
            left: 16px;
            right: 16px;
            width: auto;
            max-width: 480px;
            margin: 0 auto;
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            display: flex;
            justify-content: space-around;
            padding: 8px 4px;
            z-index: 100;
            box-shadow: 0 4px 20px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .bottom-nav .nav-item {
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-secondary);
            transition: all 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
            padding: 6px 12px;
            border-radius: 12px;
            min-width: 48px;
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
        }
        .bottom-nav .nav-item:active { transform: scale(0.88); transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); }
        .bottom-nav .nav-item .icon{font-size:1.2rem;display:block;animation:floatIcon 3s ease-in-out infinite}
        .bottom-nav .nav-item .label{font-size:0.4rem;letter-spacing:0.5px;opacity:0.5;font-weight:400}
        .bottom-nav .nav-item.active { background:rgba(108,92,231,0.06); border:1px solid rgba(108,92,231,0.08); box-shadow:0 0 30px rgba(108,92,231,0.02); color:var(--text-primary); }
        .bottom-nav .nav-item.active .icon{transform:translateY(-2px) scale(1.1); color:var(--gold); text-shadow:0 0 30px var(--gold-glow); animation:selectBounce 0.5s cubic-bezier(0.34,1.56,0.64,1) }
        .bottom-nav .nav-item.active .label{color:var(--gold);opacity:1;font-weight:400}
        .bottom-nav .nav-item:not(.active):hover { border-color:rgba(108,92,231,0.06); background:rgba(108,92,231,0.02); }
        @keyframes selectBounce { 0%{transform:scale(1)} 30%{transform:scale(1.3) rotate(-8deg)} 60%{transform:scale(0.9) rotate(4deg)} 100%{transform:scale(1.1) rotate(0deg)} }

        .footer-text{text-align:center;color:var(--text-secondary);font-size:0.45rem;margin-top:10px;opacity:0.3;letter-spacing:1px}

        .toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);background:var(--bg-secondary);padding:10px 20px;border-radius:12px;border:1px solid var(--border-color);color:var(--primary);font-weight:600;font-size:0.75rem;display:none;z-index:200;text-align:center;max-width:90%;box-shadow:0 4px 20px var(--shadow);animation:toastPop 0.4s cubic-bezier(0.34,1.56,0.64,1)}
        .toast.show{display:block}
        @keyframes toastPop{from{opacity:0;transform:translateX(-50%) translateY(30px) scale(0.85)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes floatIcon {0%,100%{transform:translateY(0px)}50%{transform:translateY(-6px)}}
        @keyframes glowPulse {0%,100%{box-shadow:0 0 10px var(--gold-glow)}50%{box-shadow:0 0 30px var(--gold-glow)}}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="left">
            <div class="logo-wrap">
                <img src="https://files.catbox.moe/lmq98x.jpg" alt="Premium Shop Logo">
                <div class="text-group">
                    <span class="premium" id="appName">Premium</span>
                    <span class="shop" id="appSub">Game Shop</span>
                </div>
            </div>
        </div>
        <div class="right">
            <div class="top">
                <div class="lang-switcher">
                    <button class="lang-btn active" data-lang="my" onclick="setLang('my')">မြန်မာ</button>
                    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
                </div>
                <button class="night-toggle" onclick="toggleNightMode()"><i class="fas fa-moon"></i></button>
                <a href="notifications.html" class="noti-btn" id="notiBtn"><i class="fas fa-bell"></i><span class="badge" id="notiBadge">0</span></a>
            </div>
        </div>
    </div>

    <div class="page-header">
        <h1><i class="fas fa-store"></i> <span id="pageTitle">Game Shop</span></h1>
        <p id="pageSub">ဂိမ်းတစ်ခုရွေးပြီး စိန်ဖြည့်လိုက်ပါ</p>
    </div>

    <div class="search-box">
        <span class="icon"><i class="fas fa-search"></i></span>
        <input type="text" id="searchInput" placeholder="🔍 ဂိမ်းနာမည်ရှာပါ..." oninput="searchGames(this.value)">
        <span class="clear-btn" id="clearBtn" onclick="clearSearch()"><i class="fas fa-times-circle"></i></span>
    </div>

    <div class="section-title"><i class="fas fa-gamepad"></i> <span id="gamesTitle">ဂိမ်းများ</span></div>
    <div class="game-grid" id="gameGrid">
        <!-- Mobile Legends -->
        <div class="game-item glass-box ripple" data-name="mobile legends mlbb" onclick="selectGame('Mobile Legends', 'mlbb', event)">
            <span class="glow"></span>
            <span class="badge" id="popularBadge" style="position:absolute;top:-2px;right:-2px;background:var(--gold);color:#fff;font-size:0.4rem;font-weight:700;padding:2px 10px;border-radius:12px;box-shadow:0 0 20px var(--gold-glow);animation:glowPulse 2s ease-in-out infinite;z-index:2">🔥 Popular</span>
            <img src="https://i.ibb.co/cKsDX2Nt/x.jpg" alt="Mobile Legends" class="game-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span class="game-img-placeholder" style="display:none;">⚔️</span>
            <div class="info">
                <div class="name">Mobile Legends</div>
                <div class="sub" id="mlbbSub">Diamond Top Up</div>
            </div>
        </div>

        <!-- MCGG (Magic Chess) -->
        <div class="game-item glass-box ripple" data-name="mcgg magic chess" onclick="selectGame('MCGG', 'mcgg', event)">
            <span class="glow"></span>
            <span class="badge" id="mcggBadge" style="position:absolute;top:-2px;right:-2px;background:var(--gold);color:#fff;font-size:0.4rem;font-weight:700;padding:2px 10px;border-radius:12px;box-shadow:0 0 20px var(--gold-glow);animation:glowPulse 2s ease-in-out infinite;z-index:2">🆕 New</span>
            <img src="https://files.catbox.moe/8lxv1s.jpg" alt="MCGG" class="game-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span class="game-img-placeholder" style="display:none;">♟️</span>
            <div class="info">
                <div class="name" id="mcggName">Magic Chess</div>
                <div class="sub" id="mcggSub">Diamond Top Up</div>
            </div>
        </div>

        <!-- Coming Soon -->
        <div class="game-item glass-box ripple" data-name="coming soon" onclick="showComingSoon()">
            <span class="glow"></span>
            <span class="game-img-placeholder">🎮</span>
            <div class="info">
                <div class="name" id="cs1">Coming Soon</div>
                <div class="sub" id="cs1sub">အသစ်ထွက်ရှိမည်</div>
            </div>
        </div>
        <div class="game-item glass-box ripple" data-name="coming soon" onclick="showComingSoon()">
            <span class="glow"></span>
            <span class="game-img-placeholder">🎯</span>
            <div class="info">
                <div class="name" id="cs2">Coming Soon</div>
                <div class="sub" id="cs2sub">အသစ်ထွက်ရှိမည်</div>
            </div>
        </div>
    </div>

    <div class="footer-text">&copy; 2026 Premium Game Shop</div>
</div>

<div class="bottom-nav">
    <a href="index.html" class="nav-item" onclick="handleNavClick(this, event)"><span class="icon"><i class="fas fa-home"></i></span><span class="label" id="navHome">ပင်မ</span></a>
    <a href="shop.html" class="nav-item active" onclick="handleNavClick(this, event)"><span class="icon"><i class="fas fa-shopping-bag"></i></span><span class="label" id="navShop">ဆိုင်</span></a>
    <a href="payment.html" class="nav-item" onclick="handleNavClick(this, event)"><span class="icon"><i class="fas fa-credit-card"></i></span><span class="label" id="navPayment">ငွေပေးချေ</span></a>
    <a href="profile.html" class="nav-item" onclick="handleNavClick(this, event)"><span class="icon"><i class="fas fa-user"></i></span><span class="label" id="navProfile">ပရိုဖိုင်</span></a>
</div>

<div class="toast" id="toast"></div>

<script>
    const LANG_DATA = {
        my: {
            appName: 'Premium', appSub: 'Game Shop',
            home: 'ပင်မ', shop: 'ဆိုင်', payment: 'ငွေပေးချေ', profile: 'ပရိုဖိုင်',
            pageTitle: 'Game Shop', pageSub: 'ဂိမ်းတစ်ခုရွေးပြီး စိန်ဖြည့်လိုက်ပါ',
            gamesTitle: 'ဂိမ်းများ', popular: '🔥 Popular',
            mcggBadge: '🆕 New',
            mcggName: 'Magic Chess',
            mcggSub: 'Diamond Top Up',
            comingSoon: 'Coming Soon', comingSoonSub: 'အသစ်ထွက်ရှိမည်',
            mlbbSub: 'Diamond Top Up',
            searchPlaceholder: '🔍 ဂိမ်းနာမည်ရှာပါ...',
            noGames: '❌ ဂိမ်းမတွေ့ပါ',
            selectGame: 'ဂိမ်းရွေးပါ', comingSoonMsg: '🎮 ဤဂိမ်းကို မကြာမီ ထည့်သွင်းပေးပါမည်။'
        },
        en: {
            appName: 'Premium', appSub: 'Game Shop',
            home: 'Home', shop: 'Shop', payment: 'Payment', profile: 'Profile',
            pageTitle: 'Game Shop', pageSub: 'Choose a game and top up diamonds',
            gamesTitle: 'Games', popular: '🔥 Popular',
            mcggBadge: '🆕 New',
            mcggName: 'Magic Chess',
            mcggSub: 'Diamond Top Up',
            comingSoon: 'Coming Soon', comingSoonSub: 'Coming Soon',
            mlbbSub: 'Diamond Top Up',
            searchPlaceholder: '🔍 Search game name...',
            noGames: '❌ No games found',
            selectGame: 'Select Game', comingSoonMsg: '🎮 This game will be added soon.'
        }
    };

    let currentLang = localStorage.getItem('lang') || 'my';

    function getText(key) { return LANG_DATA[currentLang]?.[key] || key; }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('lang', lang);
        updateLanguage();
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    }

    function updateLanguage() {
        const d = LANG_DATA[currentLang];
        if (!d) return;
        document.getElementById('appName').textContent = d.appName;
        document.getElementById('appSub').textContent = d.appSub;
        document.getElementById('pageTitle').textContent = d.pageTitle;
        document.getElementById('pageSub').textContent = d.pageSub;
        document.getElementById('gamesTitle').textContent = d.gamesTitle;
        document.getElementById('popularBadge').textContent = d.popular;
        document.getElementById('mcggBadge').textContent = d.mcggBadge;
        document.getElementById('mcggName').textContent = d.mcggName;
        document.getElementById('mcggSub').textContent = d.mcggSub;
        document.getElementById('mlbbSub').textContent = d.mlbbSub;
        document.getElementById('cs1').textContent = d.comingSoon;
        document.getElementById('cs1sub').textContent = d.comingSoonSub;
        document.getElementById('cs2').textContent = d.comingSoon;
        document.getElementById('cs2sub').textContent = d.comingSoonSub;
        document.getElementById('searchInput').placeholder = d.searchPlaceholder;
        document.getElementById('navHome').textContent = d.home;
        document.getElementById('navShop').textContent = d.shop;
        document.getElementById('navPayment').textContent = d.payment;
        document.getElementById('navProfile').textContent = d.profile;
        updateBadge();
    }

    function toggleNightMode() {
        document.body.classList.toggle('night-mode');
        const icon = document.querySelector('.night-toggle i');
        icon.className = document.body.classList.contains('night-mode') ? 'fas fa-sun' : 'fas fa-moon';
        localStorage.setItem('nightMode', document.body.classList.contains('night-mode') ? 'true' : 'false');
    }

    function handleNavClick(el, e) {
        e.preventDefault();
        const icon = el.querySelector('.icon');
        if (icon) {
            icon.style.animation = 'none';
            void icon.offsetWidth;
            icon.style.animation = 'selectBounce 0.5s cubic-bezier(0.34,1.56,0.64,1)';
        }
        setTimeout(() => { window.location.href = el.getAttribute('href'); }, 400);
    }

    // ===== BADGE FUNCTIONS =====
    function getPendingCount() {
        const notis = JSON.parse(localStorage.getItem('notifications') || '[]');
        return notis.filter(n => n.status === 'pending').length;
    }

    function updateBadge() {
        const count = getPendingCount();
        const badge = document.getElementById('notiBadge');
        if (badge) {
            if (count > 0) {
                badge.style.display = 'block';
                badge.textContent = count;
            } else {
                badge.style.display = 'none';
            }
        }
    }

    function searchGames(query) {
        const q = query.toLowerCase().trim();
        const items = document.querySelectorAll('.game-item');
        const clearBtn = document.getElementById('clearBtn');
        let found = false;

        items.forEach(item => {
            const name = item.dataset.name || '';
            if (name.includes(q) || q === '') {
                item.classList.remove('hidden');
                found = true;
            } else {
                item.classList.add('hidden');
            }
        });

        if (q.length > 0) clearBtn.classList.add('show');
        else clearBtn.classList.remove('show');

        let noMsg = document.getElementById('noGamesMsg');
        if (!found && q.length > 0) {
            if (!noMsg) {
                noMsg = document.createElement('div');
                noMsg.id = 'noGamesMsg';
                noMsg.style.cssText = 'text-align:center;padding:40px 0;color:var(--text-secondary);font-size:0.85rem;grid-column:1/-1';
                document.getElementById('gameGrid').appendChild(noMsg);
            }
            noMsg.textContent = getText('noGames');
            noMsg.style.display = 'block';
        } else if (noMsg) {
            noMsg.style.display = 'none';
        }
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        searchGames('');
        document.getElementById('clearBtn').classList.remove('show');
        document.getElementById('searchInput').focus();
    }

    // ===== SELECT GAME WITH RIPPLE EFFECT =====
    function selectGame(gameName, gameId, event) {
        // Ripple effect
        const item = event.currentTarget;
        const rect = item.getBoundingClientRect();
        const ripple = document.createElement('span');
        ripple.className = 'ripple-effect';
        const size = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (event.clientX - rect.left - size/2) + 'px';
        ripple.style.top = (event.clientY - rect.top - size/2) + 'px';
        item.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
        
        // Bounce animation
        item.classList.remove('bounce-click');
        void item.offsetWidth;
        item.classList.add('bounce-click');
        
        showToast('🎮 ' + gameName + ' ' + getText('selectGame') + '!');
        localStorage.setItem('selectedGame', JSON.stringify({ name: gameName, id: gameId }));
        
        if (gameId === 'mlbb') {
            setTimeout(() => { window.location.href = 'mlbb-packages.html'; }, 500);
        } else if (gameId === 'mcgg') {
            setTimeout(() => { window.location.href = 'mcgg-packages.html'; }, 500);
        }
    }

    function showComingSoon() {
        showToast(getText('comingSoonMsg'));
    }

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', function() {
        const savedLang = localStorage.getItem('lang') || 'my';
        setLang(savedLang);
        const nightMode = localStorage.getItem('nightMode') === 'true';
        if (nightMode) {
            document.body.classList.add('night-mode');
            document.querySelector('.night-toggle i').className = 'fas fa-sun';
        }
        updateBadge();

        window.addEventListener('storage', function(e) {
            if (e.key === 'newOrderNotification' || e.key === 'notifications') {
                updateBadge();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === '/' && !e.ctrlKey && !e.metaKey && !e.target.matches('input')) {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
            if (e.key === 'Escape') {
                clearSearch();
                document.getElementById('searchInput').blur();
            }
        });
    });
</script>
</body>
</html>
