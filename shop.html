<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🛍️ Shop - Premium Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <!-- HEADER -->
    <div class="header">
        <div class="left">
            <div class="logo-wrap">
                <img src="https://files.catbox.moe/lmq98x.jpg" alt="Premium Game Shop Logo">
                <div class="text-group">
                    <span class="premium" id="appName">Premium</span>
                    <span class="shop" id="appSub">Game Shop</span>
                </div>
            </div>
        </div>
        <div class="right">
            <div class="top">
                <div class="lang-switcher">
                    <button class="lang-btn active" data-lang="my">မြန်မာ</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
                <button class="night-toggle" id="nightToggle"><i class="fas fa-moon"></i></button>
                <a href="notifications.html" class="noti-btn" id="notiBtn"><i class="fas fa-bell"></i><span class="badge" id="notiBadge">0</span></a>
            </div>
        </div>
    </div>

    <!-- PAGE HEADER -->
    <div class="page-header">
        <h1><i class="fas fa-store"></i> <span id="pageTitle">Game Shop</span></h1>
        <p id="pageSub">ဂိမ်းတစ်ခုရွေးပြီး ပက်ကေ့ခ်ျများကို ဝယ်ယူလိုက်ပါ</p>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
        <span class="icon"><i class="fas fa-search"></i></span>
        <input type="text" id="searchInput" placeholder="🔍 ဂိမ်းနာမည်ရှာပါ..." oninput="searchGames(this.value)">
        <span class="clear-btn" id="clearBtn" onclick="clearSearch()"><i class="fas fa-times-circle"></i></span>
    </div>

    <!-- GAMES -->
    <div class="section-title">
        <i class="fas fa-gamepad"></i>
        <span id="gamesTitle">ဂိမ်းများ</span>
    </div>

    <div class="game-grid" id="gameGrid">
        <!-- Mobile Legends -->
        <div class="game-item glass-box" data-name="mobile legends bang bang mlbb" onclick="selectGame('Mobile Legends: Bang Bang', 'mlbb', event)">
            <span class="glow"></span>
            <img src="https://i.ibb.co/cKsDX2Nt/x.jpg" alt="Mobile Legends" class="game-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span class="game-img-placeholder" style="display:none;">⚔️</span>
            <div class="info">
                <div class="name">
                    <span class="line1">Mobile Legends</span>
                    <span class="line2">Bang Bang</span>
                </div>
                <div class="sub" id="mlbbSub">စိန်ဖြည့်မှု</div>
            </div>
        </div>

        <!-- Magic Chess -->
        <div class="game-item glass-box" data-name="magic chess go go mcgg" onclick="selectGame('Magic Chess: Go Go', 'mcgg', event)">
            <span class="glow"></span>
            <img src="https://files.catbox.moe/8lxv1s.jpg" alt="MCGG" class="game-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span class="game-img-placeholder" style="display:none;">♟️</span>
            <div class="info">
                <div class="name">
                    <span class="line1">Magic Chess</span>
                    <span class="line2">Go Go</span>
                </div>
                <div class="sub" id="mcggSub">စိန်ဖြည့်မှု</div>
            </div>
        </div>

        <!-- Coming Soon 1 -->
        <div class="game-item glass-box" data-name="coming soon" onclick="showComingSoon()">
            <span class="glow"></span>
            <span class="game-img-placeholder">🎮</span>
            <div class="info">
                <div class="name">
                    <span class="line1" id="cs1">Coming Soon</span>
                </div>
                <div class="sub" id="cs1sub">⏳ အသစ်ထွက်ရှိမည်</div>
            </div>
        </div>

        <!-- Coming Soon 2 -->
        <div class="game-item glass-box" data-name="coming soon" onclick="showComingSoon()">
            <span class="glow"></span>
            <span class="game-img-placeholder">🎯</span>
            <div class="info">
                <div class="name">
                    <span class="line1" id="cs2">Coming Soon</span>
                </div>
                <div class="sub" id="cs2sub">⏳ အသစ်ထွက်ရှိမည်</div>
            </div>
        </div>
    </div>

    <div class="footer-text">&copy; 2026 Premium Game Shop</div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="icon"><i class="fas fa-home"></i></span><span class="label" id="navHome">ပင်မ</span></a>
    <a href="shop.html" class="nav-item active"><span class="icon"><i class="fas fa-shopping-bag"></i></span><span class="label" id="navShop">ဆိုင်</span></a>
    <a href="payment.html" class="nav-item"><span class="icon"><i class="fas fa-credit-card"></i></span><span class="label" id="navPayment">ငွေပေးချေ</span></a>
    <a href="profile.html" class="nav-item"><span class="icon"><i class="fas fa-user"></i></span><span class="label" id="navProfile">ပရိုဖိုင်</span></a>
</div>

<div class="toast" id="toast"></div>

<script src="js/main.js"></script>
</body>
</html>
