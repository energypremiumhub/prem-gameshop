<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎮 Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
        
        :root {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255,255,255,0.6);
            --bg-input: rgba(255,255,255,0.7);
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --border-color: rgba(0,0,0,0.06);
            --shadow: rgba(0,0,0,0.06);
            --primary: #6c5ce7;
            --gold: #f5a623;
            --gold-glow: rgba(245,166,35,0.25);
            --cyan: #00b4d8;
            --cyan-glow: rgba(0,180,216,0.2);
            --orange: #ff6a00;
            --rose: #f43f5e;
            --purple: #7c3aed;
            --indigo: #4f46e5;
            --red: #ff0044;
            --violet: #8b5cf6;
        }

        .night-mode {
            --bg-primary: #0d0d1a;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(30,30,60,0.5);
            --bg-input: rgba(40,40,80,0.5);
            --text-primary: #e8eaf0;
            --text-secondary: #a8a8c8;
            --border-color: rgba(255,255,255,0.06);
            --shadow: rgba(0,0,0,0.3);
            --gold: #ffd700;
            --gold-glow: rgba(255,215,0,0.2);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 90px;
            transition: all 0.4s ease;
        }

        .container{max-width:480px;margin:0 auto}

        .header{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0 14px;flex-wrap:wrap;gap:6px}
        .header .left{display:flex;flex-direction:column;gap:8px}
        .header .left .logo-wrap{display:flex;align-items:center;gap:10px}
        .header .left .logo-wrap img{height:38px;width:auto;border-radius:10px}
        .header .left .logo-wrap .text-group{display:flex;flex-direction:column;line-height:1.1}
        .header .left .logo-wrap .text-group .premium{
            font-size:1rem;
            font-weight:800;
            background:linear-gradient(135deg, var(--purple), var(--violet), var(--indigo));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            animation:colorShift 3s ease-in-out infinite
        }
        @keyframes colorShift {
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }
        .header .left .logo-wrap .text-group .shop{font-size:0.55rem;font-weight:600;color:var(--text-secondary);opacity:0.6;margin-top:-2px}
        
        .header .right .top{display:flex;gap:6px;align-items:center}
        .header .right .top .lang-switcher{display:flex;gap:2px;background:var(--bg-card);padding:3px;border-radius:10px;border:1px solid var(--border-color);backdrop-filter:blur(20px)}
        .header .right .top .lang-switcher .lang-btn{background:transparent;border:none;color:var(--text-secondary);padding:3px 10px;border-radius:6px;font-size:0.5rem;font-weight:700;cursor:pointer;text-transform:uppercase;transition:all .3s ease}
        .header .right .top .lang-switcher .lang-btn.active{background:linear-gradient(135deg,var(--purple),var(--violet));color:#fff;box-shadow:0 4px 15px rgba(124,58,237,0.3)}
        .header .right .top .night-toggle{background:var(--bg-card);border:1px solid var(--border-color);border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;color:var(--text-secondary);backdrop-filter:blur(20px);transition:all .3s ease}
        .header .right .top .night-toggle:active{transform:scale(0.92)}
        .night-mode .header .right .top .night-toggle .fa-sun{color:#ffd700}
        .header .right .top .noti-btn{background:var(--bg-card);border:1px solid var(--border-color);border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;color:var(--text-secondary);position:relative;text-decoration:none;backdrop-filter:blur(20px);transition:all .3s ease}
        .header .right .top .noti-btn:active{transform:scale(0.92)}
        .header .right .top .noti-btn .badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:0.4rem;font-weight:700;padding:1px 6px;border-radius:50%;display:none}

        .page-header{margin-bottom:16px}
        .page-header h1{font-size:1.3rem;font-weight:800;color:var(--text-primary)}
        .page-header h1 span{
            background:linear-gradient(135deg,var(--purple),var(--violet),var(--indigo),var(--cyan));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-size:300% 300%;
            animation:gradientMove 4s ease-in-out infinite
        }
        @keyframes gradientMove {
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }
        .page-header h1 i{color:var(--purple);margin-right:6px}
        .page-header p{
            color:var(--text-secondary);
            font-size:0.7rem;
            margin-top:2px;
            background:linear-gradient(135deg,var(--purple),var(--violet));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            font-weight:600
        }

        .search-box{
            background:var(--bg-card);
            backdrop-filter:blur(20px);
            border:1px solid var(--border-color);
            border-radius:14px;
            padding:10px 16px;
            display:flex;
            align-items:center;
            gap:12px;
            margin-bottom:20px;
            transition:all .3s ease
        }
        .search-box:focus-within{border-color:var(--purple);box-shadow:0 0 40px rgba(124,58,237,0.15)}
        .search-box .icon{display:none}
        .search-box input{background:transparent;border:none;color:var(--text-primary);font-size:.85rem;flex:1;outline:none;padding:4px 0}
        .search-box input::placeholder{color:var(--text-secondary);font-size:.75rem}
        .search-box .clear-btn{color:var(--text-secondary);font-size:.8rem;cursor:pointer;padding:4px;display:none;transition:all .3s ease}
        .search-box .clear-btn:active{transform:scale(0.85)}
        .search-box .clear-btn.show{display:block}

        .section-title{
            font-size:.65rem;
            font-weight:700;
            color:var(--text-secondary);
            text-transform:uppercase;
            letter-spacing:2px;
            margin-bottom:12px;
            display:flex;
            align-items:center;
            gap:10px;
            opacity:.5
        }
        .section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border-color),transparent)}
        .section-title i{
            background:linear-gradient(135deg,var(--purple),var(--violet));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent
        }
        .section-title span{
            background:linear-gradient(135deg,var(--purple),var(--violet));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent
        }

        .game-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
        .game-item{
            background:var(--bg-card);
            backdrop-filter:blur(20px);
            border:1px solid var(--border-color);
            border-radius:14px;
            padding:12px 14px;
            cursor:pointer;
            transition:all .2s cubic-bezier(.34,1.2,.64,1);
            box-shadow:0 4px 20px var(--shadow);
            display:flex;
            align-items:center;
            gap:14px;
            position:relative;
            overflow:hidden;
            min-height:72px
        }
        .game-item:active{transform:scale(.96)!important}
        
        .game-item .glow{
            position:absolute;
            top:-50%;
            left:-50%;
            width:200%;
            height:200%;
            background:radial-gradient(circle,rgba(124,58,237,.05),transparent 70%);
            pointer-events:none;
            opacity:0;
            transition:opacity .6s ease
        }
        .game-item:active .glow{opacity:1}

        .game-item .game-img{
            width:44px;
            height:44px;
            border-radius:12px;
            object-fit:cover;
            flex-shrink:0;
            border:2px solid var(--border-color);
            position:relative;
            z-index:1
        }
        .game-item .game-img-placeholder{
            font-size:1.8rem;
            flex-shrink:0;
            width:44px;
            height:44px;
            display:flex;
            align-items:center;
            justify-content:center;
            border-radius:12px;
            border:2px solid var(--border-color);
            background:var(--bg-input);
            position:relative;
            z-index:1
        }

        .game-item .info{flex:1;min-width:0;position:relative;z-index:1}
        .game-item .info .name{
            display:flex;
            flex-direction:column;
            line-height:1.2
        }
        .game-item .info .name .line1{
            font-size:0.85rem;
            font-weight:800;
            background:linear-gradient(135deg,var(--purple),var(--violet),var(--indigo));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-size:200% 200%;
            animation:gradientMove 3s ease-in-out infinite
        }
        .game-item .info .name .line2{
            font-size:0.6rem;
            font-weight:600;
            color:var(--text-secondary);
            opacity:0.7;
            margin-top:-1px
        }
        .game-item .info .name .line1.mcgg{
            font-size:0.85rem;
            font-weight:800;
            background:linear-gradient(135deg,var(--cyan),var(--purple),var(--violet));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-size:200% 200%;
            animation:gradientMove 3s ease-in-out infinite
        }
        .game-item .info .name .line2.mcgg{
            font-size:0.6rem;
            font-weight:600;
            color:var(--text-secondary);
            opacity:0.7;
            margin-top:-1px
        }
        .game-item .info .sub{
            font-size:0.5rem;
            color:var(--text-secondary);
            margin-top:3px;
            opacity:0.6;
            font-weight:500
        }

        .game-item.hidden{display:none}
        .game-item.bounce-click{animation:bounceSoft .35s cubic-bezier(.34,1.2,.64,1)}
        @keyframes bounceSoft{0%{transform:scale(1)}35%{transform:scale(.94)}70%{transform:scale(1.02)}100%{transform:scale(1)}}

        .bottom-nav {
            position:fixed;
            bottom:16px;
            left:16px;
            right:16px;
            width:auto;
            max-width:480px;
            margin:0 auto;
            background:var(--bg-card);
            backdrop-filter:blur(24px);
            border:1px solid var(--border-color);
            border-radius:18px;
            display:flex;
            justify-content:space-around;
            padding:8px 4px;
            z-index:100;
            box-shadow:0 4px 20px var(--shadow);
            animation:navSlideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)
        }
        @keyframes navSlideUp {
            from{opacity:0;transform:translateY(30px)}
            to{opacity:1;transform:translateY(0)}
        }
        .bottom-nav .nav-item {
            text-align:center;
            cursor:pointer;
            text-decoration:none;
            color:var(--text-secondary);
            transition:all .3s cubic-bezier(.34,1.2,.64,1);
            padding:6px 12px;
            border-radius:12px;
            min-width:48px;
            border:1px solid transparent;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:1px;
            animation:floatIcon 3s ease-in-out infinite
        }
        .bottom-nav .nav-item:nth-child(2){animation-delay:0.2s}
        .bottom-nav .nav-item:nth-child(3){animation-delay:0.4s}
        .bottom-nav .nav-item:nth-child(4){animation-delay:0.6s}
        @keyframes floatIcon {
            0%,100%{transform:translateY(0px)}
            50%{transform:translateY(-4px)}
        }
        .bottom-nav .nav-item:active{transform:scale(.88)!important;animation:none}
        .bottom-nav .nav-item .icon{font-size:1.2rem;display:block}
        .bottom-nav .nav-item .label{font-size:.4rem;letter-spacing:.5px;opacity:.5;font-weight:400}
        .bottom-nav .nav-item.active{background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.12);box-shadow:0 0 30px rgba(124,58,237,.05)}
        .bottom-nav .nav-item.active .icon{
            transform:translateY(-2px) scale(1.1);
            background:linear-gradient(135deg,var(--purple),var(--violet));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent
        }
        .bottom-nav .nav-item.active .label{
            background:linear-gradient(135deg,var(--purple),var(--violet));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            opacity:1;
            font-weight:600
        }

        .footer-text{text-align:center;color:var(--text-secondary);font-size:.45rem;margin-top:10px;opacity:.3;letter-spacing:1px}

        .toast{
            position:fixed;
            bottom:85px;
            left:50%;
            transform:translateX(-50%);
            background:var(--bg-secondary);
            padding:10px 20px;
            border-radius:12px;
            border:1px solid var(--border-color);
            color:var(--purple);
            font-weight:600;
            font-size:.75rem;
            display:none;
            z-index:200;
            text-align:center;
            max-width:90%;
            box-shadow:0 4px 20px var(--shadow)
        }
        .toast.show{display:block;animation:toastPop .4s cubic-bezier(.34,1.56,.64,1)}
        @keyframes toastPop{from{opacity:0;transform:translateX(-50%) translateY(30px) scale(.85)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

        .glass-box{background:var(--bg-card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border-color);border-radius:16px}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="left">
            <div class="logo-wrap">
                <img src="https://files.catbox.moe/lmq98x.jpg" alt="Premium Shop Logo">
                <div class="text-group">
                    <span class="premium" id="appName">Premium</span>
                    <span class="shop" id="appSub">Game Shop</span>
                </div>
            </div>
        </div>
        <div class="right">
            <div class="top">
                <div class="lang-switcher">
                    <button class="lang-btn active" data-lang="my" onclick="setLang('my')">မြန်မာ</button>
                    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
                </div>
                <button class="night-toggle" onclick="toggleNightMode()"><i class="fas fa-moon"></i></button>
                <a href="notifications.html" class="noti-btn" id="notiBtn"><i class="fas fa-bell"></i><span class="badge" id="notiBadge">0</span></a>
            </div>
        </div>
    </div>

    <div class="page-header">
        <h1><i class="fas fa-store"></i> <span id="pageTitle">Game Shop</span></h1>
        <p id="pageSub">ဂိမ်းတစ်ခုရွေးပြီး ပက်ကေ့ခ်ျများကို ဝယ်ယူလိုက်ပါ</p>
    </div>

    <div class="search-box">
        <span class="icon"><i class="fas fa-search"></i></span>
        <input type="text" id="searchInput" placeholder="🔍 ဂိမ်းနာမည်ရှာပါ..." oninput="searchGames(this.value)">
        <span class="clear-btn" id="clearBtn" onclick="clearSearch()"><i class="fas fa-times-circle"></i></span>
    </div>

    <div class="section-title"><i class="fas fa-gamepad"></i> <span id="gamesTitle">ဂိမ်းများ</span></div>

    <div class="game-grid" id="gameGrid">
        <!-- Mobile Legends: Bang Bang -->
        <div class="game-item glass-box" data-name="mobile legends bang bang mlbb" onclick="selectGame('Mobile Legends: Bang Bang', 'mlbb', event)">
            <span class="glow"></span>
            <img src="https://i.ibb.co/cKsDX2Nt/x.jpg" alt="Mobile Legends" class="game-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span class="game-img-placeholder" style="display:none;">⚔️</span>
            <div class="info">
                <div class="name">
                    <span class="line1">Mobile Legends</span>
                    <span class="line2">Bang Bang</span>
                </div>
                <div class="sub" id="mlbbSub">Diamond Top Up</div>
            </div>
        </div>

        <!-- Magic Chess: Go Go -->
        <div class="game-item glass-box" data-name="magic chess go go mcgg" onclick="selectGame('Magic Chess: Go Go', 'mcgg', event)">
            <span class="glow"></span>
            <img src="https://files.catbox.moe/8lxv1s.jpg" alt="MCGG" class="game-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span class="game-img-placeholder" style="display:none;">♟️</span>
            <div class="info">
                <div class="name">
                    <span class="line1 mcgg">Magic Chess</span>
                    <span class="line2 mcgg">Go Go</span>
                </div>
                <div class="sub" id="mcggSub">Diamond Top Up</div>
            </div>
        </div>

        <!-- Coming Soon 1 -->
        <div class="game-item glass-box" data-name="coming soon" onclick="showComingSoon()">
            <span class="glow"></span>
            <span class="game-img-placeholder">🎮</span>
            <div class="info">
                <div class="name">
                    <span class="line1" id="cs1" style="font-size:0.8rem;background:linear-gradient(135deg,var(--purple),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent">Coming Soon</span>
                </div>
                <div class="sub" id="cs1sub">⏳ အသစ်ထွက်ရှိမည်</div>
            </div>
        </div>

        <!-- Coming Soon 2 -->
        <div class="game-item glass-box" data-name="coming soon" onclick="showComingSoon()">
            <span class="glow"></span>
            <span class="game-img-placeholder">🎯</span>
            <div class="info">
                <div class="name">
                    <span class="line1" id="cs2" style="font-size:0.8rem;background:linear-gradient(135deg,var(--purple),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent">Coming Soon</span>
                </div>
                <div class="sub" id="cs2sub">⏳ အသစ်ထွက်ရှိမည်</div>
            </div>
        </div>
    </div>

    <div class="footer-text">&copy; 2026 Premium Game Shop</div>
</div>

<div class="bottom-nav">
    <a href="index.html" class="nav-item" onclick="handleNavClick(this, event)"><span class="icon"><i class="fas fa-home"></i></span><span class="label" id="navHome">ပင်မ</span></a>
    <a href="shop.html" class="nav-item active" onclick="handleNavClick(this, event)"><span class="icon"><i class="fas fa-shopping-bag"></i></span><span class="label" id="navShop">ဆိုင်</span></a>
    <a href="payment.html" class="nav-item" onclick="handleNavClick(this, event)"><span class="icon"><i class="fas fa-credit-card"></i></span><span class="label" id="navPayment">ငွေပေးချေ</span></a>
    <a href="profile.html" class="nav-item" onclick="handleNavClick(this, event)"><span class="icon"><i class="fas fa-user"></i></span><span class="label" id="navProfile">ပရိုဖိုင်</span></a>
</div>

<div class="toast" id="toast"></div>

<script>
    const LANG_DATA = {
        my: {
            appName:'Premium',appSub:'Game Shop',
            home:'ပင်မ',shop:'ဆိုင်',payment:'ငွေပေးချေ',profile:'ပရိုဖိုင်',
            pageTitle:'Game Shop',
            pageSub:'ဂိမ်းတစ်ခုရွေးပြီး ပက်ကေ့ခ်ျများကို ဝယ်ယူလိုက်ပါ',
            gamesTitle:'ဂိမ်းများ',
            comingSoon:'Coming Soon',comingSoonSub:'⏳ အသစ်ထွက်ရှိမည်',
            searchPlaceholder:'🔍 ဂိမ်းနာမည်ရှာပါ...',
            noGames:'❌ ဂိမ်းမတွေ့ပါ',
            selectGame:'ရွေးချယ်လိုက်ပါ',
            comingSoonMsg:'🎮 ဤဂိမ်းကို မကြာမီ ထည့်သွင်းပေးပါမည်။',
            mlbbSub:'Diamond Top Up',
            mcggSub:'Diamond Top Up'
        },
        en: {
            appName:'Premium',appSub:'Game Shop',
            home:'Home',shop:'Shop',payment:'Payment',profile:'Profile',
            pageTitle:'Game Shop',
            pageSub:'Choose a game and purchase packages',
            gamesTitle:'Games',
            comingSoon:'Coming Soon',comingSoonSub:'⏳ Coming Soon',
            searchPlaceholder:'🔍 Search game name...',
            noGames:'❌ No games found',
            selectGame:'Selected',
            comingSoonMsg:'🎮 This game will be added soon.',
            mlbbSub:'Diamond Top Up',
            mcggSub:'Diamond Top Up'
        }
    };

    let currentLang = localStorage.getItem('lang') || 'my';

    function getText(k){return LANG_DATA[currentLang]?.[k]||k}
    function showToast(m){
        const t=document.getElementById('toast');
        if(!t)return;
        t.textContent=m;
        t.classList.add('show');
        clearTimeout(t._timer);
        t._timer=setTimeout(()=>t.classList.remove('show'),3000);
    }
    function setLang(l){
        currentLang=l;
        localStorage.setItem('lang',l);
        updateLanguage();
        document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
        localStorage.setItem('langChanged',Date.now().toString());
    }
    function updateLanguage(){
        const d=LANG_DATA[currentLang];
        if(!d)return;
        const map={
            appName:d.appName,appSub:d.appSub,pageTitle:d.pageTitle,pageSub:d.pageSub,
            gamesTitle:d.gamesTitle,cs1:d.comingSoon,cs1sub:d.comingSoonSub,
            cs2:d.comingSoon,cs2sub:d.comingSoonSub,
            searchInput:d.searchPlaceholder,
            navHome:d.home,navShop:d.shop,navPayment:d.payment,navProfile:d.profile,
            mlbbSub:d.mlbbSub,mcggSub:d.mcggSub
        };
        Object.keys(map).forEach(id=>{
            const el=document.getElementById(id);
            if(el){
                if(id==='searchInput')el.placeholder=map[id];
                else el.textContent=map[id];
            }
        });
        updateBadge();
    }
    function toggleNightMode(){
        document.body.classList.toggle('night-mode');
        const icon=document.querySelector('.night-toggle i');
        if(icon)icon.className=document.body.classList.contains('night-mode')?'fas fa-sun':'fas fa-moon';
        localStorage.setItem('nightMode',document.body.classList.contains('night-mode')?'true':'false');
    }
    function handleNavClick(el,e){e.preventDefault();setTimeout(()=>{window.location.href=el.getAttribute('href')},300)}
    function getPendingCount(){
        try{return JSON.parse(localStorage.getItem('notifications')||'[]').filter(n=>n.status==='pending').length}catch{return 0}
    }
    function updateBadge(){
        const c=getPendingCount(),b=document.getElementById('notiBadge');
        if(b){b.style.display=c>0?'block':'none';if(c>0)b.textContent=c}
    }
    function searchGames(q){
        const query=q.toLowerCase().trim(),items=document.querySelectorAll('.game-item'),clearBtn=document.getElementById('clearBtn');
        let found=false;
        items.forEach(item=>{
            const name=item.dataset.name||'';
            if(name.includes(query)||query===''){item.classList.remove('hidden');found=true}
            else item.classList.add('hidden');
        });
        if(query.length>0&&clearBtn)clearBtn.classList.add('show');
        else if(clearBtn)clearBtn.classList.remove('show');
        let noMsg=document.getElementById('noGamesMsg');
        if(!found&&query.length>0){
            if(!noMsg){noMsg=document.createElement('div');noMsg.id='noGamesMsg';noMsg.style.cssText='text-align:center;padding:40px 0;color:var(--text-secondary);font-size:0.85rem;grid-column:1/-1';document.getElementById('gameGrid').appendChild(noMsg)}
            noMsg.textContent=getText('noGames');noMsg.style.display='block';
        }else if(noMsg)noMsg.style.display='none';
    }
    function clearSearch(){
        const input=document.getElementById('searchInput');
        if(input){input.value='';searchGames('')}
        const clearBtn=document.getElementById('clearBtn');
        if(clearBtn)clearBtn.classList.remove('show');
        if(input)input.focus();
    }
    function selectGame(gameName,gameId,event){
        const item=event.currentTarget;
        item.classList.remove('bounce-click');
        void item.offsetWidth;
        item.classList.add('bounce-click');
        showToast('🎮 '+gameName+' '+getText('selectGame')+'!');
        localStorage.setItem('selectedGame',JSON.stringify({name:gameName,id:gameId}));
        if(gameId==='mlbb')setTimeout(()=>{window.location.href='mlbb-packages.html'},500);
        else if(gameId==='mcgg')setTimeout(()=>{window.location.href='mcgg-packages.html'},500);
    }
    function showComingSoon(){showToast(getText('comingSoonMsg'))}

    document.addEventListener('DOMContentLoaded',function(){
        const savedLang=localStorage.getItem('lang')||'my';
        setLang(savedLang);
        if(localStorage.getItem('nightMode')==='true'){
            document.body.classList.add('night-mode');
            const icon=document.querySelector('.night-toggle i');
            if(icon)icon.className='fas fa-sun';
        }
        updateBadge();
        window.addEventListener('storage',function(e){
            if(e.key==='langChanged'){
                const nl=localStorage.getItem('lang')||'my';
                if(nl!==currentLang){currentLang=nl;updateLanguage();document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===currentLang))}
            }
            if(e.key==='newOrderNotification'||e.key==='notifications')updateBadge();
            if(e.key==='nightMode'){
                const isNight=localStorage.getItem('nightMode')==='true';
                document.body.classList.toggle('night-mode',isNight);
                const icon=document.querySelector('.night-toggle i');
                if(icon)icon.className=isNight?'fas fa-sun':'fas fa-moon';
            }
        });
        document.addEventListener('keydown',function(e){
            if(e.key==='/'&&!e.ctrlKey&&!e.metaKey&&!e.target.matches('input')){e.preventDefault();const input=document.getElementById('searchInput');if(input)input.focus()}
            if(e.key==='Escape'){clearSearch();const input=document.getElementById('searchInput');if(input)input.blur()}
        });
    });
</script>
</body>
</html>
